  note: "Metric modulation at 1:14 converted 4/4 ~112 BPM to 3/4 ~180 BPM.
    Guitar/bass play dotted-quarter rhythms implying 6/8 against drums in 3/4."
  source: "Dorhauer 2025, form chart + metric modulation analysis"
- start: 8.0
  end: 35.0
  time_sig: "5/4"
  tempo: 180
  label: "verse subsection c — 3+2 grouping"
