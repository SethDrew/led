  source: "Dorhauer 2025, form chart"
- start: 35.0
  end: 48.0
  time_sig: "5/4"
  tempo: 180
  label: "verse subsection c' — variant"
  note: "Dorhauer marks this as c-prime, a variant of subsection c. Still 5/4."
  source: "Dorhauer 2025, form chart"
- start: 48.0
  end: 60.0
  time_sig: "3/4"
  tempo: 180
  label: "verse subsection d (partial) — transition to chorus"
  note: "Dorhauer describes the transition into chorus as 3 measures of 3/4
    followed by 1 measure of 2/4. Our clip ends at 2:30, before the chorus
    at 2:33. The full subsection d runs 2:18-2:33."
  source: "Dorhauer 2025, form chart + transition description"

