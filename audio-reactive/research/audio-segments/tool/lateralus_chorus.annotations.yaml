# Lateralus 90-150s (1:30-2:30) — End of Intro + Verse
# Source: Dorhauer 2025, "Over Analyzing Separates the Body from the Mind:
#   Metric Juxtapositions in Tool's 'Lateralus'"
# URL: https://johndorhauer.com/2025/01/16/over-analyzing-separates-the-body-from-the-mind-metric-juxtapositions-in-tools-lateralus/
# Confidence: academic (section timestamps from published form chart)
#
# IMPORTANT: This clip is MISNAMED. It covers the end of the intro (subsection b)
# and the verse (subsections c, c', start of d) — NOT the chorus.
# The chorus (subsection b') begins at 2:33 in the full song, 3 seconds after
# this clip ends. The clip name "lateralus_chorus" is retained for file continuity.

# Dorhauer's form chart for the full-song sections that fall within this clip:
#   Intro b:  1:14-1:38  (3/4, 6/8 juxtaposition, ~180 BPM)
#   Verse c:  1:38-2:05  (5/4, 3+2 grouping)
#   Verse c': 2:05-2:18  (5/4, variant of c)
#   Verse d:  2:18-2:33  (transition — 3 bars 3/4 + 1 bar 2/4, leads to chorus)
# Our clip captures 1:30-2:30, so we get the tail of intro b through most of d.

