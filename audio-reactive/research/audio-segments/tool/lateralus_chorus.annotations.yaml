analytical_discrepancy:
  topic: "Chorus time signature (outside this clip, but relevant context)"
  community_view: "Chorus uses 9/8 -> 8/8 -> 7/8 time signatures in sequence.
    Working title '987' = Fibonacci F(16). This is the dominant internet analysis."
  dorhauer_view: "Chorus (subsection b') is in 3/4 with 6/8 juxtaposition —
    a continuation of the metric dissonance from intro subsection b.
    Dorhauer does not describe changing meters in the chorus."
  reconciliation: "These may describe different analytical layers of the same music.
    The community 9/8-8/8-7/8 could refer to composite grouping patterns
    (how phrases are perceived), while Dorhauer's 3/4 with 6/8 describes
    the underlying notated meter and its metric dissonance.
    Neither analysis is necessarily wrong — they may be at different levels."
  previous_annotation_error: "The original annotation placed 9/8-8/8-7/8
    starting at clip second 7.0, which would be ~1:37 in the full song.
    Per Dorhauer, the chorus does not begin until 2:33 (clip second 63,
