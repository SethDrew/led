  - id: ema-normalization-replaces-peak-decay
    date: 2026-03-15
    touched: 2026-03-15
    title: "EMA (mean-tracking) normalization structurally outperforms peak-decay for section-aware dynamics"
    summary: >
      EMA normalization divides by a running mean rather than a decaying peak.
      Peak-tracking denominators are dominated by the single loudest moment,
      compressing everything else toward zero and erasing section differences.
      Mean-tracking normalizes against the current energy context, preserving
      both within-section dynamics (beat visibility) and inter-section contrast
      (drops feel different from builds).
    status: validated
    warmth: high
    confidence: high
    source:
      - audio-reactive/research/norm_comparison.py
      - audio-reactive/research/section_norm_test.py
      - audio-reactive/research/normalization-tests/
    tags: [feature-extraction, normalization, architecture, perception]
    relates_to: [per-band-normalization-with-dropout-handling, normalization-prior-art-audit, normalization-events-separation, feelings-are-contextual, perception-is-layered-by-timescale, ema-time-constant-is-section-relative, ema-section-boundary-contrast, ema-normalization-prior-art, frame-rate-normalization-bug, normalization-metric-bias-warning]
    notes: >
      13 normalization algorithms tested across electronic tracks. EMA with 20s
      time constant won decisively on the product metric (intra-section CV ×
      inter-section range), which measures the dual objective: preserve beats
      within sections while maintaining contrast between sections.

      The structural argument: peak-decay tracks the maximum, so after a loud
      drop the denominator stays near that peak for minutes. Everything after
      the drop normalizes to a fraction of that peak — quiet sections read as
      near-zero. EMA tracks the mean, so it adapts to whatever energy level is
      currently present, letting each section use the full 0-1 output range.

      Connects to three independent lines of prior work: divisive normalization
      in neuroscience (Carandini & Heeger 2012), PCEN in ML audio (Lostanlen &
      Salamon 2018), and EBU R128 mean-loudness broadcasting standard.

      Supersedes the peak-decay approach in per-band-normalization-with-dropout-handling.

  - id: ema-time-constant-is-section-relative
    date: 2026-03-15
    touched: 2026-03-15
    title: "Optimal EMA time constant scales with typical section length (~0.5-0.7x)"
    summary: >
      The EMA time constant should be approximately 0.5-0.7× the typical
      section length of the music. 20s for EDM (~30s sections), 30-40s for
      rock (~60s sections), 60-90s for DJ sets, 120s+ for classical.
    status: validated
    warmth: medium
    confidence: high
    source:
      - audio-reactive/research/norm_comparison.py
      - audio-reactive/research/normalization-tests/metrics.json
    tags: [feature-extraction, normalization, tuning]
    relates_to: [ema-normalization-replaces-peak-decay, perception-is-layered-by-timescale, feelings-are-contextual]
    notes: >
      20s validated on electronic music (typical section ~30s). 30s scores
      marginally better on tracks with longer sections. The ratio makes
      intuitive sense: the EMA needs to be slow enough to represent "this
      section's average" but fast enough to forget the previous section
      before the next transition.

      Should always be specified in wall-clock seconds, not per-frame decay
      constants (see frame-rate-normalization-bug). The conversion is:
      alpha = 2.0 / (time_constant_seconds * fps + 1).

      This is a genre-level parameter, not a per-song parameter. A reasonable
      default (20s) works across most electronic music. Classical and ambient
      may need a "slow music" preset.

  - id: ema-section-boundary-contrast
    date: 2026-03-15
    touched: 2026-03-15
    title: "EMA adaptation lag at section boundaries IS the section contrast signal"
    summary: >
      When energy jumps at a drop, the EMA denominator is still tracking
      the quiet section's mean — so energy/ema spikes well above 1.0. When
      energy falls in a breakdown, the denominator is still high from the
      loud section — so the output dips near zero. This transient
      "mismatch" is perceptually correct: it mirrors human auditory
      adaptation.
    status: validated
    warmth: high
    confidence: high
    source:
      - audio-reactive/research/normalization-tests/fa_br_drop1_section_comparison.png
      - audio-reactive/research/section_norm_test.py
    tags: [feature-extraction, normalization, perception, feelings]
    relates_to: [ema-normalization-replaces-peak-decay, feelings-are-contextual, derivatives-over-absolutes]
    notes: >
      Peak-decay's instant attack absorbs energy jumps in a single frame:
      the new peak becomes the denominator immediately, so the output never
      spikes. Drops are invisible to the normalizer. The slow decay means
      only downward transitions produce any contrast (and those are
      compressed by the still-high peak).

      EMA's symmetric lag works in both directions: spikes on upward
      transitions, dips on downward transitions. The "wrong" normalization
      during the transition IS the desired visual effect — it's exactly
      the surprise signal that makes drops feel like drops.

      This connects to derivatives-over-absolutes: the EMA mismatch is
      essentially a derivative signal (rate of change relative to recent
      context) embedded in the normalization itself.

  - id: frame-rate-normalization-bug
    date: 2026-03-15
    touched: 2026-03-15
    title: "Per-frame decay constants produce frame-rate-dependent normalization"
    summary: >
      The same decay constant (e.g., 0.9995) produces radically different
      time behavior at different frame rates: 64s half-life at 21.5fps but
      16s at 86fps. Effects with different hop sizes silently get different
      normalization behavior.
    status: validated
    warmth: low
    confidence: high
    source: audio-reactive/research/norm_comparison.py
    tags: [feature-extraction, normalization, failure-mode]
    relates_to: [ema-normalization-replaces-peak-decay, per-band-normalization-with-dropout-handling, ema-time-constant-is-section-relative]
    notes: >
      This is a bug in the original peak-decay specification (0.9995 per
      frame). Half-life = -ln(2) / ln(decay), measured in frames. At 30fps
      that's ~46s, but the same constant at 60fps is ~23s — half the
      musical memory.

      Fix: always specify normalization time constants in wall-clock
      seconds, then derive the per-frame constant at runtime:
      alpha = 2.0 / (time_constant_seconds * fps + 1).

      This affects any system using per-frame decay constants, including
      the original per-band-normalization-with-dropout-handling design
      and likely WLED's AGC implementation.

  - id: ema-normalization-prior-art
    date: 2026-03-15
    touched: 2026-03-15
    title: "Mean-tracking normalization has deep roots across domains — but not in the LED/VJ community"
    summary: >
      Andrew Tuline's FastLED-SoundReactive implemented mean-tracking
      (multAgc = targetAgc / sampleAvg), later replaced by peak-tracking
      in WLED. PCEN (Lostanlen & Salamon 2018) formalizes the same
      principle for ML audio. EBU R128 (2010) replaced peak with
      mean-loudness in broadcasting. Neuroscience: divisive normalization
      by pooled mean (Carandini & Heeger 2012), auditory slow adaptation
      ~12.3s (Dean et al. 2008). Nobody in the VJ/LED community has
      articulated mean > peak as a general principle.
    status: validated
    warmth: medium
    confidence: high
    source: web research (PCEN paper, EBU R128, Carandini & Heeger 2012, Dean et al. 2008, FastLED-SoundReactive source)
    tags: [normalization, prior-art, perception, neuroscience]
    relates_to: [ema-normalization-replaces-peak-decay, normalization-prior-art-audit, wled-sr-reimplemented]
    notes: >
      The convergence across domains is striking:

      - **Neuroscience**: Carandini & Heeger (2012) "Normalization as a
        canonical neural computation" — neurons divide by pooled mean
        activity, not by peak. Dean et al. (2008) measured auditory cortex
        adaptation time constant at ~12.3s in ferrets.
      - **Broadcast**: EBU R128 (2010) replaced peak metering with
        integrated mean loudness (LUFS) because peak normalization produced
        the loudness wars — exactly the same failure mode we observed.
      - **ML audio**: PCEN (Lostanlen & Salamon 2018) uses per-channel
        exponential moving average for normalization, replacing fixed or
        peak-based gain.
      - **LED community**: Tuline's FastLED-SoundReactive had mean-tracking
        AGC. WLED replaced it with peak-tracking. This project's original
        design also used peak-decay. The regression happened independently
        twice.

      The fact that WLED moved FROM mean TO peak suggests the LED community
      optimizes for "immediate responsiveness" over section-level dynamics,
      which makes sense for short demos but fails for full-song experiences.

  - id: normalization-metric-bias-warning
    date: 2026-03-15
    touched: 2026-03-15
    title: "Product metric may be structurally biased toward faster-adapting algorithms"
    summary: >
      The product metric (intra-section CV × inter-section range) may be
      biased toward EMA-like algorithms. CV is inversely proportional to
      output mean; EMA's lower mean inflates CV independent of actual beat
      visibility. The qualitative argument for EMA is strong; the
      quantitative claim rests on a potentially circular metric.
    status: exploring
    warmth: low
    confidence: medium
    source: audio-reactive/research/norm_comparison.py
    tags: [normalization, tools, data-quality]
    relates_to: [ema-normalization-replaces-peak-decay]
    notes: >
      The product metric was designed to capture the dual objective: beat
      visibility within sections (intra-CV) AND contrast between sections
      (inter-range). But CV = std/mean, so an algorithm that produces lower
      mean output (like EMA, which doesn't clamp to a peak) gets higher CV
      even if the actual beat amplitude variation is identical.

      The cross-genre "17/24 wins" claim for EMA should be treated as
      suggestive rather than definitive. The structural/qualitative argument
      (mean-tracking preserves section context, peak-tracking erases it) is
      the real evidence. The metric confirms the direction but may
      exaggerate the margin.

      Future validation: perceptual A/B tests on actual LEDs, comparing
      EMA vs peak-decay on tracks with clear section structure.

  - id: self-relative-normalization-for-integrals
    date: 2026-03-15
    touched: 2026-04-13
    title: "RMS-bounded normalization for sustained-energy integrals (not EMA)"
    summary: >
      Long-window energy accumulators (multi-second rolling integrals of RMS,
      spectral flux, etc.) should NOT be EMA-normalized — double-smoothing
      collapses dynamic range. Instead, normalize by the theoretical maximum:
      integral / (rms_peak × window_frames). Achieves r=0.90-0.999 vs
      r=0.05-0.74 for peak-decay. Applies to features that sum raw energy
      over seconds. Does NOT apply to short-window derivative integrals like
      AbsIntegral (150ms window of |d(RMS)/dt|) — those behave as
      near-instantaneous features and benefit from EMA normalization normally.
    status: validated
    warmth: medium
    confidence: high
    source:
      - audio-reactive/research/normalization-tests/fa_br_drop1_absint_comparison.png
      - audio-reactive/research/norm_comparison.py
    tags: [feature-extraction, normalization, architecture]
    relates_to: [ema-normalization-replaces-peak-decay, rolling-integral-sustained-energy]
    notes: >
      The key insight: an integral's theoretical maximum over a window is
      (peak_value × window_length). If we track the RMS peak with a fast
      EMA or peak-decay, we can bound the integral analytically without
      any adaptive normalization of the integral itself.

      This matters because integrals are already smoothed — they accumulate
      energy over their window. Applying EMA normalization on top of that
      creates double-smoothing: the integral smooths the input, then the
      EMA smooths the integral. The result loses both beat-level and
      section-level dynamics.

      Boundary: the discriminator is whether the feature represents "total
      accumulated energy" (use self-relative) vs "what is happening now"
      (use EMA). AbsIntegral integrates the derivative over 150ms — it's
      spiky, transient, and near-instantaneous. norm_comparison.py confirmed
      absint with peak-decay scores r=0.91, behaving like an instantaneous
      feature. Rolling RMS integral (10s window) scores r=0.20-0.69 with
      peak-decay — that's where self-relative normalization is needed.

  - id: proportional-mapping-needs-midrange-centering
    date: 2026-03-15
    touched: 2026-03-15
    title: "Proportional brightness mapping needs mid-range centering for equal headroom"
    summary: >
      Continuous visual parameters (brightness, size, speed) that track energy
      proportionally need their normalized input centered at mid-range, not
      pushed to the ceiling. When the reference adapts to match the signal, the
      normalized value saturates near 1.0 and loses upward headroom — quiet
      moments and loud moments both map to "near full brightness." Centering at
      0.5 preserves equal room for the signal to express both "louder than
      recent context" and "quieter than recent context." This contrasts with
      event/threshold effects, which only need clean discrimination at one
      boundary.
    status: validated
    warmth: medium
    confidence: high
    source: design conversation
    tags: [normalization, perception, architecture]
    relates_to: [feelings-are-contextual, perception-is-layered-by-timescale, normalization-events-separation, ema-normalization-replaces-peak-decay]
    notes: >
      The implementation (sigmoid, soft-clamp, etc.) is separate from the
      perceptual need. Any mapping that centers output at ~0.5 and provides
      equal headroom above and below satisfies this requirement. The sigmoid
      ratio/(ratio+1) is one such mapping; linear rescaling with clip is
      another. The key insight is about perceptual symmetry — headroom in both
      directions — not about any particular math.

  # ── Low-Brightness Dithering (2026-03) ─────────────────────────────

  - id: temporal-dithering-smooths-low-brightness
    date: 2026-03-17
    touched: 2026-03-17
    title: "16-phase temporal dithering at 300+ fps produces visibly smoother low-brightness fades on SK6812"
    summary: >
      A/B test on 50 SK6812 RGBW LEDs (first 25 dithered, last 25 raw truncated)
      confirmed that manual 16-phase temporal dithering produces visibly smoother
      fades in the 5–51 brightness range. The eye integrates rapid toggling between
      adjacent integer values (e.g. 7↔8) as fractional brightness. FastLED's
      built-in dithering only applies to setBrightness() master scaling, not
      per-pixel values — manual dithering is required for per-pixel control.
      A brightness floor of ~5 is needed to avoid the 0↔1 dead zone where
      dithering causes visible strobe. Superseded by delta-sigma modulation
      (see delta-sigma-eliminates-low-brightness-flicker).
    status: superseded
    warmth: high
    confidence: high
    source:
      - firmware/stick/src/soft_white_glow.cpp
    tags: [dithering, low-brightness, perception, sk6812, technique]
    relates_to: [hybrid-gamma-brightness, oklch-color-solid-coverage, sk6812-w-channel-worse-low-brightness]
    notes: >
      ## Mechanism

      Temporal dithering exploits flicker fusion: at frame rates above ~200 fps,
      the eye averages rapid alternations between adjacent brightness levels into
      a perceived intermediate value. For a target of 7.3, 70% of frames show
      value 8 and 30% show value 7. With 16 dither phases, we get 1/16 = 0.0625
      brightness resolution — roughly 4 bits of sub-pixel precision.

      ## What works

      - 16-phase dithering (frameCount & 15) at uncapped frame rate (~300+ fps
        on ESP32-C3 with 50 SK6812 LEDs)
      - Brightness floor of 5 to avoid the 0↔1 perceptual dead zone
      - millis()-based animation timing decoupled from frame rate, so max refresh
        rate feeds dithering quality without affecting animation speed

      ## What doesn't work

      - FastLED's built-in dithering (setDither) — only affects the global
        setBrightness() multiplier, not per-pixel values. User could not see
        any difference between FastLED with dithering on vs Adafruit NeoPixel.
      - 4-phase dithering at low values — too few phases, visible strobe
      - Dithering without a brightness floor — the 0↔1 transition is perceptually
        enormous (off vs on) and causes visible flicker at any practical frame rate

      ## Implications for the system

      Any effect that uses smooth low-brightness fades on SK6812 (glow, breathe,
      ambient) should use temporal dithering with a brightness floor. This is a
      per-pixel technique that can be applied after all color/brightness
      calculations, as a final output stage before FastLED.show().

  - id: delta-sigma-eliminates-low-brightness-flicker
    date: 2026-03-17
    touched: 2026-03-17
    title: "First-order delta-sigma modulation with gamma 2.4 eliminates visible flicker on SK6812 — complete solution"
    summary: >
      Replacing 16-phase ordered temporal dithering with first-order delta-sigma
      modulation (Fadecandy-style) completely eliminates visible low-brightness
      flicker on SK6812 RGBW. The ordered dither had an 18.75 Hz periodic ripple
      (300fps / 16 phases) within the visible flicker range. Delta-sigma is
      aperiodic and noise-shaped — no detectable flicker frequency. Combined
      with gamma 2.4 perceptual correction and a 0↔1 snap-to-zero floor, this
      produces flicker-free smooth fades across the full 0–20% brightness range
      on the W channel alone. Multi-channel RGB spreading was tested but
      unnecessary — the W channel is sufficient with proper dithering.
    status: validated
    warmth: high
    confidence: high
    source:
      - firmware/stick/src/soft_white_glow.cpp
    tags: [dithering, delta-sigma, low-brightness, perception, sk6812, technique]
    relates_to: [temporal-dithering-smooths-low-brightness, sk6812-w-channel-worse-low-brightness, hybrid-gamma-brightness, rgb-color-gamut-limitations]
    notes: >
      ## The complete pipeline (Fadecandy-style)

      1. Compute target brightness as float (animation math)
      2. Apply gamma 2.4: `pow(linear, 2.4)` — perceptual uniformity
      3. Convert to 8.8 fixed point (16-bit): `target * max_bright * 256`
      4. Snap to zero if target16 < 256 — avoids 0↔1 dither zone
      5. First-order delta-sigma per pixel: accumulate target, output high
         byte, keep low byte as residual
      6. Seed per-pixel accumulators with spread values to decorrelate dither

      ## Why ordered dithering failed

      16-phase ordered dithering (`frameCount & 15`) creates periodic
      switching at fps/16. At 300 fps, that is 18.75 Hz — well within
      visible flicker range for peripheral vision. The periodicity creates
      a detectable temporal pattern the eye can track.

      Delta-sigma replaces this with an aperiodic, noise-shaped pattern.
      The quantization noise is pushed to higher frequencies where flicker
      fusion makes it invisible.

      ## Key surprise: W channel alone is sufficient

      A/B tested delta-sigma on W-only (LEDs 0-24) vs delta-sigma on
      R+G+B warm white with no W (LEDs 25-49). Both looked great — no
      visible flicker on either. The W channel's linear 8-bit PWM is NOT
      the fundamental limitation; the dithering technique is. With proper
      delta-sigma, even a single 8-bit channel produces perceptually smooth
      fades. Multi-channel spreading adds complexity without visible benefit
      when delta-sigma is already applied.

      ## Implementation cost

      Per-pixel accumulator: 2 bytes per channel. For 50 LEDs on W channel:
      100 bytes. Negligible on ESP32-C3 (320KB RAM). The deltaSigma()
      function is 3 operations (add, shift, mask) — no measurable impact
      on frame rate.

      ## Applicability

      This pipeline should be the standard output stage for all SK6812
      effects that need smooth dimming. It replaces both the raw truncation
      approach and the 16-phase ordered dithering. The gamma curve,
      delta-sigma modulation, and 0↔1 floor are independent of the
      animation/effect logic upstream.

  - id: per-channel-noise-gate-kills-die-strobe
    date: 2026-04-05
    touched: 2026-04-05
    title: "Per-channel noise gate eliminates non-deterministic RGB die strobe on SK6812 RGBW"
    summary: >
      When unequal RGB channels are active at low brightness, the weaker channel's
      target16 falls below 256 and delta-sigma dithers it between 0 and 1 — visible
      as intermittent flashing on individual LED dies. The coordinated noise gate
      (snap ALL channels if max < threshold) misses this because the dominant channel
      keeps the max above threshold. Fix: snap each channel independently to 0 if
      its target16 < 256. Validated at 249fps with bioluminescence bloom (G+B color).
    status: validated
    warmth: high
    confidence: high
    source:
      - festicorn/bulbs/src/async_bloom_test.cpp
      - audio-reactive/research/datasets/sk6812-pipeline-telemetry/gate_comparison_bloom_2026-04-05.csv
    tags: [dithering, low-brightness, perception, sk6812, noise-gate, technique]
    relates_to: [delta-sigma-eliminates-low-brightness-flicker, rgbw-pure-w-at-low-brightness]
    notes: >
      ## The problem

      Effects that use colored light (not warm white) drive multiple RGB channels
      with unequal values. At low brightness, the weaker channel gets a very small
      target16 (e.g., G=50 when B=400). Delta-sigma correctly dithers this between
      0 and 1, but the SK6812's internal 1.2kHz PWM makes value=1 a brief pulse
      (0.4% duty cycle) — perceptually a dim flash, not a steady glow. The toggle
      between "no pulse" and "brief pulse" is visible, especially in peripheral vision.

      ## Why the coordinated gate missed it

      The existing noise gate checked `if (maxCh < threshold)` and snapped ALL
      channels to zero. With unequal channels (G=50, B=400), maxCh=400 passes
      the gate, leaving G=50 to strobe. The gate was designed for the case where
      the entire pixel is near-zero, not for mixed-brightness channels.

      ## The fix

      Per-channel gating: `if (tG16 < 256) tG16 = 0;` for each channel independently.
      Threshold of 256 means any channel that would ever output 0 (target < 1.0 in
      8-bit) gets snapped to full black. The dominant channel stays smooth via
      delta-sigma. The visual effect is that the color becomes slightly purer at
      very low brightness (e.g., losing green tint, just blue) — acceptable for
      most effects.

      ## Relationship to pure-W routing

      The fire effect's pure-W crossover (shift to W-only below 10% brightness)
      was an effect-specific workaround for this same problem — it avoided RGB
      dies entirely at low brightness. Per-channel gating is the general solution
      for colored effects that can't shift to warm white (e.g., bioluminescence
      blue/teal, rainbow hues).

      ## Two independent problems discovered

      Testing revealed that "low-brightness strobe" was actually two stacked
      problems: (1) insufficient frame rate for delta-sigma (solved by LUT math
      replacing sinf/powf — 40fps → 250fps on ESP32-C3 without FPU), and
      (2) per-channel die strobe from unequal RGB values (solved by per-channel
      noise gate). Both fixes are needed for clean output on colored effects.

  # ── INMP441 MEMS Microphone Characterization ──────────────────────

  - id: inmp441-frequency-response
    date: 2026-03-17
    touched: 2026-04-26
    title: "INMP441 MEMS mic has heavy bass/mid deficit vs system audio (distance-dependent); 'treble comparable' is unreproduced"
    summary: >
      Dual-capture comparison (BlackHole system loopback vs INMP441 acoustic
      pickup) shows the INMP441 is ~16-22 dB quieter overall with heavy
      bass loss whose magnitude depends on mic distance. The original
      2026-03-17 measurement reported sub-bass -15, bass -28, mids -21,
      treble "comparable". A 2026-04-26 re-validation reproduced the bass
      loss (-30 dB at 3 ft, -16 dB at 0 cm — proximity effect) but found
      treble 36-43 dB down in BOTH ambient and near-field conditions, so
      the "treble comparable" claim is treated as unreproduced. See
      inmp441-validation-2026-04-26.
    status: validated
    warmth: high
    confidence: high
    source: dual-capture measurements — original 2026-03-17, re-validation 2026-04-26 (library/test-vectors/inmp441-validation/)
    tags: [hardware, microphone, inmp441, frequency-response, esp32, measurement]
    relates_to: [taps-track-bass-peaks, equal-loudness-weighting-dead-end, inmp441-validation-2026-04-26]
    notes: >
      The 24 dB overall level difference is fixable with gain or normalization.
      The frequency imbalance is the real problem — it is a property of the
      MEMS element's mechanical response plus the acoustic path (speaker to
      mic through air), not an amplitude issue. No amount of broadband gain
      will restore the missing bass energy. The INMP441 datasheet shows flat
      response 100 Hz-10 kHz on-axis in an anechoic chamber, but real-world
      acoustic pickup (off-axis, room reflections, speaker directivity) adds
      significant additional roll-off below 250 Hz.

      Key numbers (original 2026-03-17 measurement):
        Sub-bass (20-80 Hz):    -15 dB  (attenuated but present)
        Bass (80-250 Hz):       -28 dB  (essentially absent)
        Mids (250-2 kHz):       -21 dB  (heavily attenuated)
        High-mids (2-6 kHz):    ~-10 dB (moderate loss)
        Treble (6-8 kHz):       comparable
        Overall RMS:            -24 dB
        Envelope correlation:   0.29  (weak)
        SNR:                    3.9 dB (poor)

      The bass deficit is particularly severe because bass (80-250 Hz) is
      where kick drums live — the primary beat-tracking target (see
      taps-track-bass-peaks). The INMP441 essentially cannot see the
      signal that drives most of our beat detection.

      ## 2026-04-26 re-validation update

      Re-ran the dual-capture experiment with two distance conditions to
      isolate proximity effects and produce reusable test vectors. Full
      methodology and 60s WAV pairs at library/test-vectors/inmp441-validation/.
      See inmp441-validation-2026-04-26 for the standalone entry.

      Per-band Δ dB (INMP441 − system; negative = mic quieter):

        band      | original | ambient (3 ft) | near-field (0 cm)
        ----------|----------|----------------|-------------------
        sub-bass  | -15      | -16.5          | -12.4
        bass      | -28      | -30.5          | -16.4
        mids      | -21      | -35.8          | -16.2
        high-mid  | (n/a)    | -40.5          | -27.7
        treble    | "comp."  | -43.0          | -36.1

      What reproduced:
      - Bass loss at 3 ft matches the original -28 dB closely (-30.5 dB).
        The original "near speaker" condition was likely ~1 m, not literally
        on the cone.
      - Sub-bass loss reproduces at both distances.
      - Bass loss is real and dominant across deployments — qualitative
        claim holds even though magnitude is distance-dependent.

      What did NOT reproduce:
      - "Treble comparable" — treble is 36-43 dB down even with the mic
        touching the speaker. INMP441's high-frequency roll-off above
        ~6 kHz at moderate SPL is consistent with this; the original
        "comparable" reading is treated as an outlier or methodology
        artifact.

      Caveat: system reference peak shifted between the two re-validation
      runs (0.58 → 0.37), so cross-run absolute magnitudes have a few dB
      of slop. Per-band ratios within each run are clean.

  - id: inmp441-validation-2026-04-26
    date: 2026-04-26
    touched: 2026-04-26
    title: "Dual-capture re-validation of INMP441 vs system audio in two distance conditions"
    summary: >
      Re-ran the original inmp441-frequency-response measurement under
      ambient (mic 3 ft from speaker on a table) and near-field (mic
      touching speaker face, ≈0 cm) conditions to isolate distance
      dependence and produce reusable test vectors. Bass-loss claim
      reproduces with strong distance dependence (~30 dB at 3 ft,
      ~16 dB at 0 cm). "Treble comparable" claim does NOT reproduce —
      treble is 36-43 dB down in both conditions.
    status: validated
    warmth: medium
    confidence: high
    source: library/test-vectors/inmp441-validation/{ambient,nearfield}/
    tags: [hardware, microphone, inmp441, frequency-response, measurement, test-vectors, validation]
    relates_to: [inmp441-frequency-response, inmp441-signal-impact, inmp441-normalization-limits]
    notes: >
      ## Methodology

      Wrote a new firmware variant raw_audio_sender that streams 16 kHz
      int16 PCM from the INMP441 over USB CDC at 460800 baud (vs the
      production stream_sender which only emits ~100 Hz RMS). Captured
      synchronized BlackHole loopback + INMP441 acoustic pairs via a
      dual_capture.py host script (threading.Event for sync). 60 s per
      condition. Per-band FFT comparison via compare_inmp441_vs_system.py
      reproduces the original ledger table format.

      ## Conditions

      - Ambient: mic on a table 3 ft from speaker, NOT in direct point
        source path. Subjective volume "ambient". Small bedroom.
      - Near-field: mic literally on the speaker face (≈0 cm). Same
        speaker, same room.

      Same INMP441 hardware, same speaker, same room across both runs.
      Music routed through BlackHole loopback for system reference.

      ## Headline numbers

      Per-band Δ dB (INMP441 − system; see frequency-response entry table).

      Envelope Pearson: ambient 0.575, near-field 0.824 — both higher
      than the original 0.29, suggesting the INMP441 actually tracks the
      source meaningfully even in heavily-attenuated bands. The original
      0.29 may reflect a noisier room or different averaging window.

      Alignment lag: ambient 270 ms, near-field 110 ms. Consistent with
      acoustic propagation (3 ft ≈ 3 ms) plus DMA buffering — most of the
      lag is buffering, with distance contributing the differential.

      ## Implication for signal design

      Across all three reference conditions (system audio, INMP441 ambient,
      INMP441 near-field), bass is the *strongest* relative band on the
      mic — not the weakest as inmp441-signal-impact suggested. The
      bass-dominance problem we'd been thinking about as a system-audio
      issue applies equally on INMP441, for different physical reasons
      (room acoustics + proximity effect, not signal energy).

      Per-band normalization on a transient primitive (per-band absint)
      is the correct design move in all conditions. Treble band on
      INMP441 needs SNR gating because per-band normalization on a
      near-noise band would amplify noise to full scale.

      ## Reusable artifacts

      WAV pairs in library/test-vectors/inmp441-validation/ are reusable
      test vectors for offline signal design — analyze candidate
      decomposition pipelines against both conditions without re-running
      hardware capture. README in the same directory documents the
      experiment fully.

      The full pipeline is reproducible from source: firmware variant
      raw_audio_sender (festicorn/bulbs/src/), capture script
      dual_capture.py and comparison script compare_inmp441_vs_system.py
      (audio-reactive/tools/). Re-flashing the Duck and running
      dual_capture.py reproduces the WAV pairs end-to-end.

