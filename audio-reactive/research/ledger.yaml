  - id: normalization-prior-art-audit
    date: 2026-02-21
    touched: 2026-02-22
    title: "Per-band peak-decay normalization matches industry standard; dropout emphasis is a separate problem"
    summary: >
      Audit of normalization approaches against AGC, broadcast leveling, VJ
      software (WLED, Resolume, TouchDesigner, scottlawsonbc), PCEN, and EBU R128.
      Per-band peak-decay (instant attack, slow exponential decay) is the standard
      approach across LED visualization systems. No VJ system does per-band adaptive
      recovery for band dropout/reintroduction — multi-band compressors handle it
      but aim to hide the recovery, not emphasize it.
    status: validated
    warmth: medium
    confidence: high
    source: web research (WLED wiki, scottlawsonbc, EBU R128, PCEN papers, AGC docs, FabFilter/iZotope docs)
    tags: [architecture, feature-extraction, prior-art]
    relates_to: [per-band-normalization-with-dropout-handling, normalization-events-separation, vj-conventions-reuse-question, wled-sr-reimplemented]
    notes: >
      Two rounds of research. First round audited our original conflated design
      (asymmetric EMA + freeze + constant decay) against general normalization.
      Second round focused on per-band dropout handling specifically.

      Key findings: (1) scottlawsonbc is closest — per-filterbank asymmetric EMA
      (α=0.99/0.001). (2) WLED uses global PI-controller AGC with squelch.
      (3) Multi-band compressors (FabFilter Pro-MB, iZotope Ozone) handle per-band
      recovery but with 50-500ms release aimed at transparency. (4) Multi-band
      upward expansion can boost on threshold crossing but isn't duration-dependent.
      (5) PCEN is per-channel adaptive normalization for ML, same principle.

      Original design had two novel mechanisms (reference freeze, constant decay)
      but these conflated normalization with event emphasis. After splitting,
      normalization is standard peak-decay. The novel dropout emphasis ideas are
      deferred to the events layer.

  - id: normalization-events-separation
    date: 2026-02-22
    touched: 2026-02-22
    title: "Normalization and event emphasis are separate layers — don't conflate them"
    summary: >
      Normalization produces clean 0-1 values per band (peak-decay, industry
      standard). What to do with dramatic transitions in those values — dropout
      reintroduction boost, build detection, section emphasis — belongs in the
      events/temporal layer downstream. Conflating them makes normalization
      harder to reason about and harder to match against prior art.
    status: resonates
    warmth: high
