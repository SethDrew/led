  - id: ld-vj-decision-decomposition
    date: 2026-03-02
    touched: 2026-03-02
    title: "LD and VJ decisions decompose into discrete signal types at multiple timescales"
    summary: >
      Professional lighting designers and VJs don't just "feel" the music —
      their intuitive decisions decompose into discrete signal responses at
      specific timescales. LDs count 8-bar phrases, use modular building blocks
      (not complete looks), think in energy states (low/medium/high/peak), and
      make decisions at phrase boundaries. VJs think in compositional layers
      (background/midground/foreground), hold states for 8-16 bars minimum, and
      switch scenes at section boundaries. Both use a hybrid approach: automation
      handles low-level sync (beat-locked effects), humans handle high-level
      decisions (scene changes, narrative arc). The gap between automated and
      human shows is at the phrase/section timescale — frame and beat level are
      solved, arc level is too slow to matter moment-to-moment.
    status: validated
    warmth: high
    confidence: high
    source: web research — interviews with Steve Lieberman (SJ Lighting), Ross Chapple, Resolume/TouchDesigner/VDMX communities, ControlBooth forums, DJ Techtools, PLSN podcasts
    tags: [visual-design, architecture, timescale, show-control]
    relates_to: [automated-show-phrase-detection-is-key, perception-is-layered-by-timescale, two-quality-axes]
    notes: >
      Key heuristic from LDs — limit to 2 contrasting colors per song (avoid
      "rainbow vomit"). Reserve strobes for genuine climaxes (max 2-3 per song).
      VJ anti-pattern: beginners over-switch effects, pros hold states longer.
      Both LD and VJ communities confirm the hybrid approach wins — timecoded
      sequences for choreographed moments + live "busking" for spontaneity.

