  - id: automated-show-phrase-detection-is-key
    date: 2026-03-01
    touched: 2026-03-02
    title: "Phrase-level section detection is the critical gap — and NOT solved"
    summary: >
      Real-time phrase/section detection is NOT a solved problem. Beat/downbeat
      tracking is solved (BeatNet, BEAST >80% F1, <50ms latency). But semantic
      section detection (verse/chorus/build/drop) relies on self-similarity
      matrices requiring the full song — fundamentally non-streaming. All
      commercial DJ tools (Rekordbox, Mixed In Key, SoundSwitch) use pre-analysis,
      not real-time detection. Simple streaming heuristics exist (rolling integral
      slope, kick dropout, onset density, spectral centroid derivative) but are
      crude and will need significant project-specific R&D.
    status: exploring
    warmth: high
    confidence: medium
    source: [library/arch-impl/axis6-composition/SHOW_AUTOMATION.md, web research (SoundSwitch, MaestroDMX, Engine Lighting, BeatNet, BEAST, ISMIR papers, madmom, librosa, essentia)]
    tags: [architecture, feature-extraction, future, phrase-detection]
    relates_to: [event-detection-viewer-only, d2-spike-drop-detector, perception-is-layered-by-timescale, normalization-events-separation, rolling-integral-sustained-energy]
    notes: >
      2026-03-01: Initial entry claimed commercial tools "prove" phrase detection
      is solved-enough. This was based on marketing copy.

      2026-03-02 correction: Deeper research reveals commercial tools use
      PRE-ANALYSIS, not real-time streaming. Rekordbox, Mixed In Key, SoundSwitch
      all analyze tracks before playback. Only MaestroDMX claims real-time, but
      its algorithm is proprietary and user reviews call it "not much more
      sophisticated than enhanced sound-to-light."

      The fundamental problem: self-similarity matrices (the basis of good section
      detection) are O(n²) in song length and require the full signal. No published
      causal alternative matches offline methods. MIR toolkits (madmom, librosa,
      essentia) are batch-oriented — none have native streaming section detection.

      What exists for real-time: simple heuristics — rolling integral slope, kick
      dropout (40-100Hz onset density), onset density gradients, spectral centroid
      derivative. These are causal and fast (<1ms) but crude. They won't generalize
      across genres without tuning, and even for our use case will likely need
      significant R&D to feel right. This is an active research area, not a solved
      problem we can import.

      Song-level energy arc (10+ minute trajectory) is actually EASIER than phrase
      detection — long timescales are forgiving, multi-scale rolling averages work
      well. This may be more important than phrase-level for our use case (whole-song
      lightshows on sculptures playing DJ sets).

      Our rolling integral (5s window, per-band) exists in viewer.py but is untested
      as a streaming section detector. d² spike density is complementary for drops.

  - id: dj-crowd-energy-encoding
    date: 2026-03-01
    touched: 2026-03-02
    title: "DJ crowd reading — musical decisions encode energy state"
    summary: >
      When a DJ reads the crowd and responds, their decisions manifest as
      measurable audio changes: tempo drift (2-3 BPM gradual shifts), breakdown
      duration, transition speed, filter sweeps, percussive density changes, and
      key shifts. The music itself becomes a proxy for crowd energy state. For an
      automated LED system receiving DJ audio, the DJ is already the crowd
      sensor — we detect the DJ's responses, not the crowd directly.
    status: validated
    warmth: high
    confidence: high
    source: web research — DJ TechTools, Mixed In Key, Rekordbox documentation, r/DJs, r/Beatmatch, Digital DJ Tips, DJ education materials, forums, academic sources
    tags: [audio-analysis, dj-analysis, energy-encoding, crowd-reading, music-structure, architecture, crowd-energy]
    relates_to: [automated-show-phrase-detection-is-key, derivatives-over-absolutes, feelings-are-contextual, feeling-layer-human-loop, perception-is-layered-by-timescale]
    notes: >
      ## Core Insight
      When LED sculpture receives music from a DJ, the DJ has ALREADY read the
      crowd and encoded that reading into their musical decisions. The music
      itself is the crowd state proxy. DJs respond to low energy vs high energy
      with detectable changes in the audio stream.

      ## Discrete Signals DJs Detect from Crowds
      - Head-nodding and foot-tapping (medium energy)
      - Synchronized cheers and sing-alongs (peak engagement)
      - Hands in the air, bodies moving closer to booth (high energy)
      - Bar traffic, phone use, crossed arms (energy dips)
      - Zone analysis: front (high), middle (medium), back (low energy)
      - Top DJs spend ~42% of set time observing crowd behavior patterns
      - If 30%+ of crowd moves to bar = immediate energy dip requiring action

      ## Musical Changes DJs Make in Response

      ### Building Energy (responding to crowd readiness)
      - Increase tempo (gradual 2-3 BPM steps feel natural)
      - Shorter breakdown duration (8 bars vs 16-32 bars)
      - Faster transitions (16-32 beats vs longer blends)
      - Filter sweeps (high-pass removing lows, then sudden release)
      - Add percussive layers (increasing density)
      - Familiar tracks with high recognition value
      - Rising key changes (using Camelot Wheel +1 position)
      - Harder kicks with more low-end weight (40-100 Hz emphasis)
      - Shorter loop cycles (creating tension through repetition)

      ### Cooling Down (responding to fatigue or over-stimulation)
      - Lower tempo (gradual decrease)
      - Longer breakdowns (16-32 bars, melodic interludes)
      - Genre shift to deeper/mellower subgenres
      - More space between elements (minimalist approach)
      - Deep cuts and unfamiliar tracks (less demanding)
      - Lower energy level ratings (on 1-10 scale)
      - Extended filter sweeps (slower development)

      ## DJ Set Structure Vocabulary

      ### Standard Arc (Three Acts)
      1. Warm-Up: 110-125 BPM, energy level <7, light/eclectic, 16-32 bar intros
      2. Peak Time: 128-135 BPM, maximum energy, shorter breakdowns (8 bars),
         familiar tracks, tension/release cycles
      3. Closing/Cool-Down: Can wind down OR go out with emotional impact,
         deeper sounds, longer phrases

      ### Energy Management
      - "Peaks and valleys" — not constant maximum
      - One main peak ~2/3 through set, plus 1-2 smaller peaks earlier
      - Valleys give crowd chance to breathe and reset
      - Well-timed breakdown can be as powerful as drop after sustained intensity

      ### Phrasing (Critical for Detection)
      - 4 beats = 1 bar
      - 8 bars = standard phrase (most common mixing unit)
      - 16 bars = typical intro/outro (designed for transitions)
      - 32 bars = common full intro in tech house
      - Breakdowns: 8-16 bars (house/techno), up to 32 bars (deep house)
      - Builds: typically 8 bars, can be 4-12 bars
      - DJs mix on phrase boundaries for smooth transitions

      ## Tension and Release Techniques

      ### Creating Tension
      - Remove kick drum (4-8 bars before drop)
      - High-pass filter sweep (progressively remove lows)
      - Add risers, reverb tails, delay feedback
      - Percussion builds (gradually adding layers)
      - Loop tightening (shorter and shorter loops creating frenzy)
      - Resonance boost on filter sweeps

      ### Providing Release
      - Full frequency spectrum return (especially 40-100 Hz kick fundamental)
      - Drop on phrase boundary (predictable timing)
      - Bassline return after high-pass filter
      - Familiar melodic element recognition
      - "Energy reset" track for genre shifts

      ## Audio Features That Encode DJ Decisions

      ### Tempo/BPM Ranges by Genre and Energy State
      - Deep house warm-up: 120-125 BPM
      - Peak house: 128 BPM
      - Peak techno: 130-135 BPM
      - Minimal techno: 120-150 BPM (varies by subgenre)
      - Hip hop: 80-100 BPM
      - Drum & bass: 165-180 BPM
      - Small BPM changes (2-3) feel natural, large jumps signal major shift

      ### Frequency Content
      - Kick fundamental: 40-100 Hz (most modern kicks 80-120 Hz)
      - Kick body/character: 100-600 Hz
      - Kick attack/click: 1-4 kHz
      - High-pass filtering indicates build/tension
      - Full spectrum return = release/drop
      - Spectral brightness increase = energy rising

      ### Breakdown Structure (Detectable in Real-Time)
      - Kick removal (clearest signal of breakdown)
      - Filter sweep progression (time-domain feature)
      - Percussive density reduction
      - Reverb/delay increase (creating space)
      - Duration: 8-16 bars typical, 32 bars for deep genres

      ### Percussive Density
      - Minimal techno: few elements, lots of space
      - Peak energy: maximum layering of percussion
      - Gradual addition of hi-hats, shakers, claps = building
      - Stripped back to kick only = creating anticipation

      ### Track Familiarity (Harder to Detect, But Relevant)
      - DJs use familiar tracks at energy peaks (60% of clubgoers prefer mix)
      - Recognition creates shared excitement
      - Deep cuts for artistic moments, warm-up, cool-down
      - Cannot be detected from audio alone, but affects crowd response

      ## Energy Level Detection in DJ Software

      ### Mixed In Key (Patented System)
      - Energy Level: 1-10 scale (patented algorithm)
      - Higher = more danceable
      - Can sort playlists by energy level
      - Integrates with Rekordbox, Serato, Traktor
      - Algorithm details proprietary, but likely uses:
        * Loudness (RMS, LUFS)
        * Spectral features (brightness, centroid)
        * Percussive density
        * Tempo

      ### Rekordbox
      - Phrase analysis (low/mid/high mood detection)
      - Vocal analysis (AI-based)
      - Relies on Mixed In Key for energy level metadata
      - Beatgrid analysis (static vs dynamic)
      - Real-time energy indicators (1-5 scale on mobile app)

      ### Harmonic Mixing (Camelot Wheel)
      - Key compatibility for smooth transitions
      - Energy Boost: +1 position on wheel = rising key feel
      - DJs use key changes to add tension/release independent of tempo

      ## Implications for LED System

      ### Detectable in Real-Time from Audio Stream
      1. Tempo changes (BPM tracking over time)
      2. Kick presence/absence (40-100 Hz energy, onset detection)
      3. Filter sweep direction (spectral centroid derivative)
      4. Percussive density (onset count per time window)
      5. Breakdown detection (kick removal + spectral change)
      6. Build detection (rising high-pass filter, increasing density)
      7. Phrase boundaries (8/16/32 bar detection via beat tracking)
      8. Frequency spectrum shifts (brightness, low-end weight)

      ### Not Easily Detectable (But Still Relevant)
      - Track familiarity (would need database/fingerprinting)
      - Genre classification (complex, but doable with ML)
      - Crowd energy (DJs detect visually, we infer from music)
      - DJ's intention (build toward peak vs cool-down)

      ### Design Implications
      - LED system should respond to DERIVATIVES of these features, not absolutes
        (aligns with derivatives-over-absolutes principle)
      - Context matters: same BPM feels different at different points in arc
        (aligns with feelings-are-contextual principle)
      - Multiple timescales: phrase-level (8 bars), section-level (verse/chorus),
        arc-level (warm-up → peak → cool-down)
        (aligns with perception-is-layered-by-timescale principle)
      - Tension/release cycles are THE core DJ technique
        (aligns with build-taxonomy and tension-mapping entries)
      - Breakdown detection is critical: kick removal + filter sweep + duration
        (implementable with existing onset + spectral features)

      ## Next Steps for Implementation
      1. BPM tracking over time (detect gradual shifts vs sudden jumps)
      2. Kick onset detector (40-100 Hz band, onset strength)
      3. Spectral centroid derivative (filter sweep detection)
      4. 8-bar phrase boundary detection (rhythmic self-similarity)
      5. Percussive density (onset count per 8-bar window)
      6. Breakdown classifier: kick_present + spectral_brightness + duration
      7. Energy level estimator (combine tempo, density, spectrum)

      ## Vocabulary for Future Use
      - Warm-up, peak time, cool-down (set structure)
      - Breakdown, build, drop (phrase-level events)
      - Filter sweep (high-pass/low-pass frequency manipulation)
      - Phrase, bar, beat (rhythmic units: 8 bars = phrase)
      - Tension and release (core aesthetic driver)
      - Percussive density (layering metric)
      - Energy level (1-10 scale, subjective danceability)
      - Phrasing (aligning transitions to phrase boundaries)
      - Mix-in, mix-out (transition entry/exit points)
      - Cue points (markers for key structural moments)
      - Energy reset (palate cleanser for genre shifts)
      - Peaks and valleys (energy arc wave pattern)

      ## 2026-03-02 update
      Refined framing: the DJ IS the crowd sensor. For an automated LED system,
      we don't need to detect the crowd — we detect what the DJ already decided
      to do in response. Most detectable signals: kick presence/absence (clearest
      structural marker), filter sweep direction (spectral centroid derivative),
      percussive density (onset count), phrase boundaries (8/16/32 bar), tempo
      drift. Key insight: +1 on Camelot wheel = energy boost. Standard DJ set
      arc: warm-up (110-125 BPM, energy <7) -> peak time (128-135 BPM, energy
      8-10) -> cool-down. Main peak typically at ~2/3 through set.

  - id: rgb-color-gamut-limitations
    date: 2026-03-02
    touched: 2026-03-06
    title: "RGB LED color gamut is physically constrained — but fixable in layers"
    summary: >
      RGB LED strips have two stacked color problems: (1) no gamma correction
      means linear PWM vs nonlinear perception — orange looks yellow, warm tones
      are wrong; (2) 8-bit depth crushes low-brightness resolution after gamma
      correction (~28 values map to 0). Four complementary fixes exist, each
      adding a layer of quality.
    status: validated
    warmth: high
    confidence: high
    source: []
    tags: [hardware, perception, color, future]
    relates_to: [gamma-height-curve, hue-shift-low-brightness, hybrid-gamma-brightness, ws2812b-channel-brightness]
    notes: >
      Excited about this direction — exploring at own pace.

      ## The problem stack
      1. **Gamma correction missing**: LED driver ICs use linear PWM but eyes
         perceive brightness logarithmically. Monitors/OS handle this transparently;
         LED strips don't. A gamma LUT (exponent ~2.5-2.7) fixes most color mixing
         issues. Per-channel R/G/B tables can further tune white balance.
      2. **8-bit quantization at low brightness**: After gamma correction, the
         first ~28 input values all map to 0 output. Pastels and subtle warm tones
         get destroyed. This is intrinsic to 8-bit PWM.

      ## Solution layers (cumulative, in order of effort)
      1. **Gamma LUT (software, free)**: Apply per-channel gamma correction before
         sending to strip. Step one regardless of anything else. Adafruit has a
         full guide. We already use gamma for height mapping — this is the same
         concept for color.
      2. **RGBW strips (hardware swap)**: SK6812 RGBW adds a dedicated white channel
         (warm 3000K / neutral 4000K / cool 6000K). Fourth mixing dimension helps
         enormously with pastels, skin tones, amber. Warm-white variant fills
         exactly the spectral gaps that make orange/warm tones hard with pure RGB.
         Drop-in compatible with WS2812B code (just needs 4-channel support in
         FastLED/WLED).
      3. **Temporal dithering (Fadecandy approach)**: Delta-sigma modulation — rapidly
         wiggle each pixel ±1 at ~400Hz to achieve effective 16-bit resolution for
         fades. Especially powerful for low-brightness colors and smooth gradients.
         Tradeoff: max ~64 LEDs per line due to high refresh rate. Fadecandy project
         abandoned (creator MIA since 2018), but technique implementable on ESP32
         with DMA. WLED community has discussed adding it.
      4. **Physical diffusion**: Material matters but distance matters more. Spatially
         averages adjacent pixels = free spatial dithering. Combined with temporal
         dithering, larger/diffuse sculptures get even higher low-brightness precision.
         Milky/opal acrylic in aluminum channel is standard. Opal variants may shift
         color temp slightly warmer — could actually help warm-tone problem.

      ## Key insight
      We're not capped out on color quality. The likely state is: sending linear RGB
      values to LEDs that need gamma-corrected values, using RGB strips where RGBW
      would give richer mixing. Recommended stack: SK6812 RGBW (warm white) + gamma
      LUT + diffusion channel. Add temporal dithering if extreme low-brightness
      smoothness needed. These are corrections monitors have had for decades — LED
      strips just leave them up to you.

      ## 2026-03-06 update: gamma brightness validated
      Layer 1 (gamma LUT) is now implemented and tested on hardware. Adafruit's
      gamma8 table (gamma=2.8) produces visibly smoother dimming than linear.
      Combined with OKLCH rainbow via hybrid gamma — apply gamma to the brightness
      multiplier, not per-channel. See hybrid-gamma-brightness for details.

      ## Connection to project
      Gamma correction for color is distinct from our gamma-height-curve (topology
      mapping) but same mathematical concept. Color gamma would live in the rendering
      pipeline, applied to final RGB values before serial write. RGBW would require
      4-byte-per-pixel serial protocol change and new firmware.

  - id: signal-level-fusion-tempo
    date: 2026-03-02
    touched: 2026-03-02
    title: "Signal-level multi-onset fusion beats period-level fusion and plain onset for tempo"
    summary: >
      Normalizing 3 onset functions (spectral flux, energy flux, harmonic flux)
      by running peak and summing into a single signal before autocorrelation
      achieves 62% LED-acceptable on FMA 300 tracks — +9pp over onset alone (53%)
      and +6pp over period-level fusion vote (56%). PLP offline ceiling is 77%.
    status: validated
    warmth: medium
    confidence: high
    source: effects/test_tempo_3way.py  # tempo_3way_results.json deleted in library reorg
    tags: [tempo, onset, fusion, autocorrelation, benchmark]
    relates_to: [onset-vs-absint-comparison, onset-envelope-for-tempo]
    notes: >
      Tested 6 algorithms on FMA 300-track stratified sample + 10-track curated set.

      ## Ranking (FMA 300, LED-acceptable = octave multiples within 10%)
      1. PLP (offline, librosa.beat.plp): 77% — ceiling, needs full signal
      2. SignalFusionTempoTracker: 62% — REAL-TIME WINNER
      3. FusionTempoTracker (vote, period-level): 56%
      4. AdaptiveTempoTracker (onset + fusion fallback): 55%
      5. OnsetTempoTracker (HW spectral flux): 53% — baseline
      6. HarmonicChangeTempoTracker (chroma L2): 49%

      ## Signal-level fusion architecture
      Three onset functions per frame:
      - Spectral flux (HW multi-band): detects energy onsets
      - Energy flux (HW RMS diff): broadband energy changes
      - Harmonic flux (chroma L2): chord boundaries
      Each normalized 0-1 by running peak (decay 0.998), summed, single autocorrelation.
      Key: one autocorrelation on combined signal > combining separate period estimates.

      ## Genre effects (SignalFusion vs Onset)
      - International: +28pp (76% vs 48%) — biggest gain
      - Rock: +16pp (66% vs 50%)
      - Folk: +15pp (50% vs 35%)
      - Hip-Hop: +5pp (66% vs 61%)
      - Electronic: -9pp (56% vs 65%) — chroma/energy add noise to clean percussive signal
      - Instrumental: tied at 83%

      ## Why Adaptive disappoints
      Onset locks early (5.5s median) even when wrong. The "fallback after 10s if
      low confidence" strategy rarely triggers. Would need confidence-quality check
      (is the lock CORRECT?) not just confidence-existence check.

      ## PLP gap (15pp)
      PLP uses predominant local pulse — fundamentally different from autocorrelation.
      Works on onset envelope via librosa, offline only. Real-time PLP approximation
      could be valuable future work.

      ## Practical recommendation
      SignalFusionTempoTracker should replace OnsetTempoTracker as default for LED
      effects. +9pp across all genres, huge gains on folk/international/rock.

  - id: spatial-topology-coordinate-embedding
    date: 2026-03-03
    touched: 2026-03-03
    title: "2D coordinate embedding beats graph-based topology for small planar sculptures"
    summary: >
      For the diamond sculpture (72 LEDs, 3 branches, planar structure),
      assigning (x, y) coordinates via keyframe interpolation and pre-computing
      a Euclidean distance matrix is simpler and more effective than an explicit
      graph representation. The 72x72 distance matrix is equivalent to a
      fully-connected weighted graph — every pair has a distance. Spatial effects
      (pulse radiation, ripples, proximity glow) use distances_from() which is
      just a row lookup.
    status: integrated
    warmth: high
    confidence: high
    source: implementation of topology.py, analysis of diamond spatial layout
    tags: [architecture, topology, spatial, coordinate-system]
    relates_to: [sculpture-3d-vs-addressing-1d, diamond-topology, input-role-taxonomy]
    notes: >
      The diamond sculpture has non-trivial topology: right and middle branches
      cross twice (apex 42/71, mid-height 46/66), right branch self-loops at
      52/56, and LEDs 4/63 are near-neighbors across left/middle branches.
      Coordinate embedding handles all of this naturally — crossovers become
      coincident points, self-loops become path segments that revisit a
      coordinate, and near-neighbors get small distances automatically.

      When would a graph beat coordinates? (1) Non-planar structures where
      Euclidean distance is misleading (e.g., LEDs on opposite sides of a tube).
      (2) When you want path distance (along the wire) rather than Euclidean.
      (3) Structures too complex for keyframe interpolation. For the diamond
      and tree sculptures, coordinate embedding is the right choice — the
      structure is planar and small enough that the full distance matrix is
      trivial (~20KB).

  - id: tempo-genre-applicability
    date: 2026-03-04
    touched: 2026-03-04
    title: "Onset autocorrelation tempo detection only applies to electronic/hip-hop — folk/rock/metal need different approach"
    summary: >
      Autocorrelation-based tempo trackers (Onset, SignalFusion, Harmonic)
      fundamentally detect periodicity in onset/energy envelopes. This works
      for genres with steady percussive patterns (electronic, hip-hop) but
      fails on folk, rock, and metal where tempo is carried by human feel,
      guitar strumming patterns, or complex polyrhythmic drumming. Removing
      these genres from the evaluation changes the ranking: OnsetTempoTracker
      is best for electronic (+9pp over SignalFusion), roughly tied on
      hip-hop. SignalFusion's harmonic component actively hurts on electronic
      (adds noise to clean percussive signal).
    status: validated
    warmth: high
    confidence: high
    source: re-analysis of tempo-tracker-3way-comparison results by genre
    tags: [tempo, genre, methodology, evaluation]
    relates_to: [tempo-tracker-3way-comparison, tactus-ambiguity]
    notes: >
      ## Design philosophy: don't solve all problems with the same tool

      OnsetTempoTracker is preferred not because it's the "best" tracker
      overall, but because it's the most honest. When onset autocorrelation
      fails to find tempo, it reports low confidence — and that's the correct
      answer. The music may genuinely not be tempo-driven in the way onsets
      can detect. SignalFusion tries harder by fusing 3 signals, but "trying
      harder" on music that isn't onset-periodic just produces confident
      wrong answers.

      The cost asymmetry is key: a false positive (pulsing on wrong tempo)
      looks actively bad. A false negative (falling back to fixed period or
      a non-tempo-driven mode) looks fine. So we want the tracker that fails
      honestly, not the one that fails less often but lies about it.

      ## Folk, rock, metal: different analysis entirely

      If onset autocorrelation can't detect tempo in these genres, the right
      response isn't to build a better tempo detector — it's to question
      whether tempo is even the right signal to extract. These genres may be
      better served by:
      - Energy contour / dynamics (loud vs quiet, tension vs release)
      - Spectral texture evolution (bright vs dark, dense vs sparse)
      - Section-level structure (verse/chorus feel changes)
      - Melodic/harmonic movement (chord progressions, key changes)

      The LED mapping for a folk song might not pulse at all — it might
      breathe with phrasing, shift color with harmony, or track intensity
      arcs. Forcing a tempo grid onto music that doesn't live on one is
      the wrong abstraction. This connects to the MOOD vector research
      (Brightness, Texture, Tension, Fullness) which may be more
      universally applicable than tempo across genres.

  - id: oklch-perceptual-rainbow
    date: 2026-03-05
    touched: 2026-03-06
    title: "OKLCH variable-L rainbow is the best color mapping for WS2812B strips"
    summary: >
      After testing 6 approaches (HSV+gamma, HSV raw, OKLCH constant chroma,
      OKLCH per-hue max chroma at constant L, temporal dithering, binary POV),
      OKLCH with variable lightness and per-hue max chroma wins decisively.
      Hue-dependent L (red ~0.52, purple ~0.38, green/cyan/yellow 0.75) with
      smooth cosine interpolation produces rich dark reds and purples while
      keeping bright greens/cyans. 256-entry LUT, no runtime math.
    status: validated
    warmth: high
    confidence: high
    source: [festicorn/src/effects.cpp, audio-reactive/effects/color/oklch.py, audio-reactive/effects/color/gen_firmware_lut.py, festicorn/bench-tree/src/tree_rainbow_test.cpp]
    tags: [color, perception, hardware, oklch, validated]
    relates_to: [rgb-color-gamut-limitations, hue-shift-low-brightness]
    notes: >
      ## All experiments (chronological, side-by-side on 150-LED strip)

      1. **HSV+gamma32 vs OKLCH constant chroma (C=0.127)**: OKLCH more uniform
         but all colors muted — conservative chroma stays in gamut for ALL hues.
      2. **HSV+gamma32 vs HSV raw (no gamma)**: No meaningful difference. Blue
         dominates both. gamma32 doesn't help perceptual uniformity.
      3. **HSV raw vs OKLCH per-hue max chroma (L=0.75, C=0.128–0.259)**: OKLCH
         clearly better — hues distributed more evenly, colors vibrant. BUT dark
         red and dark purple missing (L=0.75 too bright).
      4. **16-bit gamma + temporal dithering**: Correct but only helps dim
         gradients. Not visible at full brightness rainbow.
      5. **Binary POV mixing (full on/off at ~700fps)**: Worked but unclear
         perceptual difference from standard PWM.
      6. **OKLCH constant-L vs OKLCH variable-L**: Variable-L wins. Dark reds
         and purples now present and rich. User confirmed "basically perfect."

      ## Winner: OKLCH variable-L with per-hue max chroma
      - Lightness profile: cosine dips centered at OKLCH hue 30deg (red, depth
        0.23 → L=0.52) and 300deg (purple, depth 0.37 → L=0.38), smooth taper
        to L=0.75 for green/cyan/yellow.
      - Per-hue max chroma via binary search at 98% gamut boundary.
      - 256-entry precomputed LUT. Zero runtime cost vs HSV.
      - Generator script: audio-reactive/effects/color/gen_firmware_lut.py
        (single source of truth: audio-reactive/effects/color/oklch.py)

      ## Root cause of HSV rainbow problems (three stacked)
      1. HSV is perceptually non-uniform — blue/green dominate perceptual space
      2. Per-channel gamma32 shifts mixed-channel hues toward primaries
      3. WS2812B green LED is ~2x brighter than red, ~4x brighter than blue
         (datasheet: G 1100-1400 mcd, R 550-700 mcd, B 200-400 mcd — see
         ws2812b-channel-brightness). Dominant factor is photopic eye response,
         not LED die efficiency.

      ## Techniques NOT worth pursuing further
      - **HSV+gamma**: gamma corrects brightness curve but doesn't fix hue
        distribution. No perceptual improvement over raw HSV.
      - **Temporal dithering**: only matters at low brightness, irrelevant for
        rainbow effects at normal brightness.
      - **Binary POV**: interesting but no clear win, much more complex.

      ## Still on the table (not tested, hardware changes)
      - **RGBW strips (SK6812)**: dedicated white channel for pastels/amber.
        Would complement OKLCH for palette effects, not needed for rainbow.
      - **Physical diffusion**: spatial averaging via opal acrylic. Complementary
        to any color space choice.
      - **Per-channel gamma**: fine-tune R/G/B independently. Could refine OKLCH
        further but unlikely to be visible.

  - id: ws2812b-channel-brightness
    date: 2026-03-06
    touched: 2026-03-06
    title: "WS2812B channel brightness: three LED dies, not phosphors"
    summary: >
      WS2812B uses three separate LED dies (AlGaInP for red, InGaN for green
      and blue), not phosphor conversion. Datasheet luminous intensity:
      G 1100-1400 mcd, R 550-700 mcd, B 200-400 mcd. Green ~2x red, ~4x blue.
      The dominant factor in perceived brightness difference is the human photopic
      response curve (peak sensitivity at 555nm green), not LED die efficiency.
    status: validated
    warmth: medium
    confidence: high
    source: [WS2812B-V5 datasheet (Worldsemi), cpldcpu intensity measurements]
    tags: [hardware, perception, color, ws2812b]
    relates_to: [oklch-perceptual-rainbow, rgb-color-gamut-limitations]
    notes: >
      ## Corrects earlier assumption

      Previous ledger entries referred to "phosphor brightness ratios" — this
      was incorrect. WS2812B is NOT a phosphor-converted white LED with color
      filters. It's three independent LED dies:
      - **Red**: AlGaInP (aluminium gallium indium phosphide), ~625nm
      - **Green**: InGaN (indium gallium nitride), ~525nm
      - **Blue**: InGaN (indium gallium nitride), ~470nm

      ## Why green appears brighter

      Two compounding factors:
      1. **LED die output**: Green die produces ~2x the luminous intensity of
         red, ~4x blue (datasheet mcd values).
      2. **Photopic response**: Human eyes are most sensitive at 555nm (green).
         The photopic luminosity function V(λ) peaks at green and drops
         sharply toward red and blue. This means even equal-power light
         from all three dies would appear green-dominant.

      Our OKLCH variable-L rainbow accounts for this by lowering L for greens
      relative to a naive uniform rainbow — the cosine lightness profile was
      tuned by visual A/B testing on actual strips.

      ## Key sources
      - WS2812B-V5 datasheet (Worldsemi): electrical/optical characteristics table
      - cpldcpu (Tim): intensity measurements with BH1750 light sensor confirming
        datasheet values (blog, 2022). Note: these are luminance measurements,
        not spectral — no spectrometer was used.

  - id: ws2812b-perceptual-research-gap
    date: 2026-03-06
    touched: 2026-03-06
    title: "No rigorous perceptual color research exists for WS2812B"
    summary: >
      Comprehensive survey of LED community projects found no published
      perceptual color appearance research specific to WS2812B. FastLED, Adafruit,
      WLED, and Fadecandy all use eyeballed or loosely scientific corrections.
      Our OKLCH approach with hardware A/B testing is at least as rigorous as
      anything published.
    status: validated
    warmth: high
    confidence: high
    source: [community survey 2026-03-06]
    tags: [color, perception, research-gap, community]
    relates_to: [oklch-perceptual-rainbow, ws2812b-channel-brightness]
    notes: >
      ## What each project does

      | Project | Correction | Published Research |
      |---------|-----------|-------------------|
      | FastLED | TypicalLEDStrip (0xFFB0F0) = scale G to 70%, B to 94% | None |
      | Adafruit | gamma8 LUT, gamma=2.8 | None |
      | Fadecandy | gamma=2.5 + temporal dithering | None |
      | WLED | FastLED-derived color handling | None |
      | cpldcpu | Intensity measurements with light sensor | Blog posts, not peer-reviewed |

      No project has published perceptual appearance research for WS2812B.
      All corrections are approximated without controlled testing methodology.

      ## Our approach

      We generate perceptually correct RGB from scratch using OKLCH
      (Björn Ottosson's perceptually uniform color space), with:
      1. Per-hue maximum chroma at 98% sRGB gamut boundary
      2. Hue-dependent lightness tuned by A/B testing on WS2812B strips
      3. Separate gamma correction for brightness dimming (gamma=2.8)

      This is fundamentally different from the "correct bad RGB" approach —
      we generate correct RGB from scratch.

      ## Why no prior research exists

      The LED art community is maker-oriented, not academic. Approximate
      corrections work for most use cases, and perceptual testing requires
      careful methodology (dark adaptation, viewing distance, controlled
      comparisons). Individual strip variation may also exceed correction
      precision.

  - id: hybrid-gamma-brightness
    date: 2026-03-06
    touched: 2026-03-06
    title: "Hybrid gamma brightness: smooth dimming that reaches full brightness"
    summary: >
      Validated brightness control for OKLCH rainbow: apply Adafruit gamma8
      (gamma=2.8) to the brightness multiplier (not per-channel), with linear
      crossover ramp from 80% to 100% input so max brightness is achieved.
      Gamma applied to brightness, not individual R/G/B channels.
    status: validated
    warmth: high
    confidence: high
    source: [festicorn/bench-tree/src/gamma_test.cpp]
    tags: [color, perception, gamma, brightness, validated]
    relates_to: [oklch-perceptual-rainbow, rgb-color-gamut-limitations]
    notes: >
      ## The key insight: gamma on brightness, not per-channel

      Applying gamma correction per-channel (running each R, G, B value through
      gamma8[]) destroys colors. A pixel with RGB (200, 3, 0) — a deep red with
      a trace of green — becomes (137, 0, 0) because gamma8[3]=0. The slight
      green warmth is crushed.

      The correct approach: apply gamma to the scalar brightness multiplier,
      then scale all three channels by that single value. This preserves hue
      and saturation while correcting the brightness curve.

      ## Hybrid crossover design

      Pure gamma=2.8 maps input 255 to output ~255 but input 204 to output
      137 — the top 20% of input covers 46% of output range. This is fine for
      dimming but means the slider spends too long in dim territory.

      Hybrid solution:
      ```cpp
      const uint8_t CROSSOVER = 204;  // 80% of 255
      uint8_t gammaHybrid(uint8_t v) {
          if (v <= CROSSOVER) return gamma8[v];
          uint8_t base = gamma8[CROSSOVER];  // = 137
          return base + (v - CROSSOVER) * (255 - base) / (255 - CROSSOVER);
      }
      ```

      Below 80%: follow gamma curve (smooth, perceptually uniform dimming).
      Above 80%: linear ramp from gamma8[204]=137 to 255 (reach full brightness).

      ## Hardware validation

      Tested on ESP32 + 150 WS2812B strip, folded in half for side-by-side
      comparison. Two OKLCH rainbows cycling through brightness: left=hybrid
      gamma, right=linear. User confirmed smooth dimming with no visible
      discontinuity. At max brightness both sides produce identical RGB
      (verified by serial dump of all 28 pixel pairs).

      Reversed strip sides to confirm a slight visual difference at max
      brightness was signal degradation on the wire, not algorithmic.

  - id: oklch-color-solid-coverage
    date: 2026-03-06
    touched: 2026-03-06
    title: "OKLCH color solid: 2 of 3 axes validated, chroma axis pending"
    summary: >
      The WS2812B-renderable color solid has three axes in OKLCH: Hue (H),
      Lightness (L), and Chroma (C). We have validated two: hue via the OKLCH
      variable-L rainbow LUT, and lightness via hybrid gamma brightness. The
      chroma (saturation) axis is not yet addressed — desaturated/pastel colors
      are unreachable with current effects.
    status: spark
    warmth: high
    confidence: high
    source: []
    tags: [color, perception, oklch, roadmap]
    relates_to: [oklch-perceptual-rainbow, hybrid-gamma-brightness, rgb-color-gamut-limitations]
    notes: >
      ## What the OKLCH rainbow covers

      The rainbow LUT is a 1D slice through the 3D OKLCH color solid:
      - **Hue (H)**: Full 360° sweep — all renderable hues present. ✓
      - **Lightness (L)**: Hue-dependent via cosine profile (0.38–0.75). ✓
      - **Chroma (C)**: Maximum per-hue at 98% gamut boundary — always
        fully saturated. This means the rainbow CANNOT represent:
        - Pastels (low chroma, high L)
        - Earth tones (low chroma, mid L)
        - Near-whites and near-blacks (very low chroma)
        - "Dusty" or "muted" variants of any hue

      ## Brightness axis adds the second dimension

      The hybrid gamma brightness curve lets us dim the rainbow while
      preserving color relationships. This covers the L axis independently
      of hue. Combined with the rainbow's hue sweep, we can reach any
      (H, L) pair — but always at maximum chroma.

      ## What's needed for chroma (future work)

      To access the full renderable color solid, we need a chroma control:
      - A "saturation slider" that reduces C from max toward 0
      - At C=0, all hues collapse to the same gray (at whatever L)
      - Gradient palettes that vary C (e.g., deep blue → pastel blue → white)
      - This is the natural next step for palette design

      User has expressed interest in saturation gradients for future work.

