  - id: bulb-gesture-taxonomy-methodology
    date: 2026-04-26
    touched: 2026-04-26
    title: Gesture taxonomy for interactive hanging bulb — kind × severity, with a hybrid severity rule
    summary: >
      Locked an event schema for IMU-driven gestures on a hanging bulb:
      kind ∈ {tap, shake, movement} × severity ∈ {light, medium, hard,
      severe}, plus extras for periodicity, dominant axis, and concurrent
      reorientation. Drumming is not a separate kind or flag — it's just
      multiple tap events in sequence. Key conceptual finding: severity
      needs a hybrid rule — peak \|a\| for short single-impulse taps (RMS
      undersells a 50ms strike inside a 3s window), RMS \|a\| for sustained
      gestures (peak clips at the sensor rail above light). Validated on
      13 real episodes from two captures (MPU-6050 @ 200 Hz). The
      classifier that implements these rules is example code, not a locked
      artifact; thresholds will evolve as more recordings come in.
    status: validated
    warmth: high
    confidence: medium
    source: festicorn/bulbs/data/recordings/gesture_taxonomy.md
    tags: [imu, gesture, classification, bulbs, input-roles, severity]
    relates_to: [feelings-are-contextual, derivatives-over-absolutes]
    notes: >
      Why this trichotomy fits the data:
        - tap separates cleanly when crest ≥ 4.5 OR (n_peaks ≥ 5 AND stroke_rate
          ≥ 1.8). Catches single strikes and sustained drumming.
        - movement separates cleanly when grav_angle ≥ 25° AND ac_strength
          < 0.55 AND crest < 4.0. The ac_strength gate is the critical part —
          a pendulum swing rotates gravity but is *oscillation*, not active
          reorientation.
        - shake is the default. Pendulum swing-decay lands here by stipulation:
          the gravity vector may rotate during a swing, but the motion is
          driven by oscillation, not active hand-rotation.

      Why hybrid severity:
        - peak_amag clips at ~58k counts (1.78 g) on the ±2g range; useless
          above light for any sustained gesture (clipped in 8/13 episodes).
        - RMS_amag does not clip in any episode here, but for short single-
          impulse taps it is dominated by the silent portion of the window
          and undersells the strike. Example: one episode had peak 14k counts
          but RMS only 1519 because the strike was ~50ms inside a 3.4s window.
        - Mode A (peak-based, used when kind=tap AND crest≥6 AND
          stroke_rate<1.8) catches single hard strikes. Mode B (RMS-based)
          catches everything else including drumming.

      Honest limits of the schema:
        - Above the saturation ceiling, hard and severe cannot be reliably
          distinguished without a wider-range sensor.
        - Drumming-vs-fast-shake is not separable by these features. A 2×
          time-stretched shake misclassifies as tap because the stroke rate
          crosses the drumming threshold. Open: do they need to be separated
          perceptually? Maybe they don't.
        - tap+movement composites (drumming while reorienting) are a real
          thing; we resolve by calling the kind tap and flagging
          concurrent_movement=true.

      Methodological observations:
        - User-labeled gesture intent at capture time is essential.
          Reverse-engineering the trichotomy from features alone would have
          missed soft-touch as a distinct sub-category of light movement.
        - Calibration ladders (12 single taps at labeled intensities) are
          worth more than another freeform 60s capture. The current data has
          0–2 examples per (kind, severity) cell with 4 cells empty; ladders
          would let us validate thresholds against intent.

      Coverage matrix (real + 16 synthetic transforms):
                light    medium   hard     severe
        tap     EMPTY    ✓        ✓        ✓
        shake   ✓        ✓ (synth) ✓       ✓
        movement ✓       ✓        ✓        EMPTY (need real, geometric)

  - id: bulb-tap-quiet-floor-gate
    date: 2026-04-28
    touched: 2026-04-28
    title: Quiet-floor gate separates isolated taps + drumming from sustained motion
    summary: >
      A single shape feature — "did the signal touch quiet within the past
      200 ms?" — cleanly separates discrete strikes (taps, drumming) from
      sustained motion (shaking, dancing, swinging). Rule: fire when
      peak_axis_ac_g ≥ 0.50 g AND min(peak over last 5 packets) < 0.15 g.
      Validated on the 13-episode duck capture; preserves 95–96% of
      labeled tap/drum strikes while suppressing 71% of shake-segment
      false-fires. Not currently integrated — the production receiver
      (festicorn/biolum, festicorn/bench-bulbs) keeps the simpler hard
      0.50 g threshold because the installations only need to react to
      "movement happened," not to distinguish kinds. Park here for when
      we want different LED responses for "you tapped me" vs "you're
      shaking me."
    status: dormant
    warmth: medium
    confidence: high
    source: festicorn/gyro-sense/data/recordings/duck_gestures/20260426T210735.csv
    tags: [imu, gesture, classification, bulbs, shape-features, future]
    relates_to: [bulb-gesture-taxonomy-methodology, derivatives-over-absolutes]
    notes: >
      Why this works mechanically: a tap deposits a brief impulse (2–10 ms)
      followed by quiet; drumming has 50–150 ms of quiet between strikes;
      sustained motion (shake, dance, free-pendulum decay) keeps the
      per-window peak floor elevated above ~0.15 g for the entire bout.
      Rolling MIN over a short past window picks up the difference cheaply.
      Rolling MEAN over 1 s does NOT — drumming + shaking have similar
      time-averaged energy; the gap only opens up when you look at how
      *recently* the signal touched zero.

      Survival on the duck capture (per user-reported segments):
        ep1 pick it up    movement    0/0  fires
        ep2 hold it       movement    0/0
        ep3 shake it      movement   28→8  (71% suppressed)
        ep4 tap it        tap        23→22 (96% kept)
        ep5a drum on it   tap        40→38 (95% kept)
        ep5b dance        movement   12→7  (42% suppressed)
        ep5c free-decay   movement    5→2  (60% suppressed)

      What it does NOT solve:
        - Free-pendulum decay (ep5c) and dance (ep5b) leak ~40–60% because
          the bulb passes through low-energy moments at oscillation
          turnarounds — looks indistinguishable from "tap on a quiet bulb."
          A pendulum-aware filter would need gyro magnitude (rotation rate
          gives away "swinging" vs "struck") or a longer history.
        - The first few hits of a sustained shake still fire because the
          baseline hasn't built up yet. Arguably correct: "the gesture that
          starts the swing" is a real tap.

      Implementation cost is trivial: one 5-element ring buffer of recent
      peaks (~20 bytes RAM), scan-for-min on each packet (~5 comparisons).
      No new wire fields; the per-axis max/min the v1 schema already ships
      is sufficient. Plot at /tmp/duck_quietfloor.png in the analysis
      session that derived this; analysis script /tmp/plot_duck_quietfloor.py.

      Companion finding: rolling-MEAN baselines (1 s window) do NOT
      separate drumming from shaking — both produce similar time-averaged
      energy. The mechanism is "return-to-floor between events," not
      "average energy level," so a MIN tracker is the right primitive.
      Recorded so we don't have to rediscover this if we revisit
      classifier work.

  - id: bulb-movement-hard-gate-sufficient
    date: 2026-04-28
    touched: 2026-04-28
    title: A single 0.50 g hard gate captures every bulb-interaction need we currently have
    summary: >
      For every interactive bulb installation we are running today
      (festicorn/biolum, festicorn/bench-bulbs), "movement detected" is
      the only gesture distinction the LED behavior actually needs.
      A single hard gate — peak_axis_ac_g ≥ 0.50 g, computed from the
      v1 wire schema's per-axis AC max/min on each 40 ms packet — fires
      cleanly on intentional human contact (tap, drum, shake, pick-up)
      while staying silent on a hanging-pendulum baseline (~0.25 g
      ambient, swinging-after-let-go ~0.30 g). No normalization, no
      shape features, no classifier. The architectural point is that
      this is *enough* — and recognizing that it is enough, before
      adding machinery, is the choice that matters.
    status: integrated
    warmth: high
    confidence: high
    source: festicorn/biolum/src/bloom.cpp, festicorn/bench-bulbs/src/bench.cpp
    tags: [imu, gesture, bulbs, input-roles, simplicity, architecture]
    relates_to: [bulb-gesture-taxonomy-methodology, bulb-tap-quiet-floor-gate, derivatives-over-absolutes, feelings-are-contextual]
    notes: >
      Why 0.50 g is the right number: the hanging-bulb idle floor on the
      ±2 g range sits around 0.20–0.30 g (small breeze, residual sway,
      sensor noise); a deliberate human tap or shake delivers ≥0.75 g
      on the per-axis AC excursion. 0.50 g lands in the middle of that
      gap, comfortably away from both. The same threshold works for
      bench-bulbs because the duck-shaped sender produces the same
      per-axis AC characteristic when handled.

      Why this is architectural, not implementation:
        - It validates the v1 wire schema's per-stat layout (ax_max,
          ay_max, az_max, then mins, then means) as the right level of
          detail. We have NOT needed to add fields, change cadence, or
          revisit the 16-byte budget.
        - It validates the input-role assignment for bulbs: bulbs are
          a binary "I am being touched / I am at rest" sensor, not a
          gesture-classification problem. The complexity ceiling for
          this input role is therefore low.
        - It validates a working stance for the project: ship the
          simple thing that captures what's needed; defer the classifier
          until a concrete LED behavior requires the distinction.

      What the simple gate gives up: it cannot distinguish a tap from a
      shake from a pick-up. It fires once per packet whenever any of
      those happens. For both current installations that is the desired
      behavior — biolum's bloom effect treats any contact as "wake up
      and bloom"; bench-bulbs' v1 indicator treats any contact as
      "show that the sender is alive." Neither asks the question that
      a classifier would answer.

      When this assumption breaks: when an installation needs different
      LED responses for "you tapped me" vs "you're holding/shaking me"
      vs "you let go and I'm swinging" — the quiet-floor gate
      (bulb-tap-quiet-floor-gate, dormant) is the next step. Until
      then, do not preemptively add it.

  - id: four-band-decomposition-hypothesis
    date: 2026-04-29
    touched: 2026-04-29
    title: "Four-band split (20/80/250/2000/8000 Hz) — hypothesis for the next default decomposition"
    summary: >
      Working hypothesis, not a conclusion. Splitting the legacy 3-band
      decomposition (20/250/2000/8000) by adding a sub-bass edge at 80 Hz
      may better serve two distinct goals at once: (1) mic handling —
      separating the bass region the INMP441 amplifies from the very low
      end where the mic's response is more variable, and (2) reduction of
      single-band dominance in effects — giving the kick its own routable
      stream so it stops slamming the same band as the bassline. Untested
      on real LED output.
    status: spark
    warmth: medium
    confidence: low
    source: []
    tags: [normalization, frequency-bands, decomposition, hypothesis, inmp441]
    relates_to: [per-band-normalization-with-dropout-handling, per-band-feature-expansion, inmp441-amplifies-source-bass-tilt, inmp441-signal-impact, band-zone-pulse-effect]
    notes: >
      ## What this is

      A candidate edge layout for the band decomposer feeding effects:
      sub-bass 20-80, bass 80-250, mids 250-2000, treble 2000-8000.
      Same EMA-ratio normalizer per band as today; one extra coefficient
      out, one extra band edge in. Minimum-viable change to the existing
      pipeline.

      ## Two goals this is meant to serve

      1. **Mic handling.** INMP441 amplifies bass tilt and rolls off
         treble (see inmp441-amplifies-source-bass-tilt,
         inmp441-frequency-response). A sub-bass split lets us reason
         about / gate / re-weight the very-low region independently of
         the rest of the bass region, instead of folding mic-rumble and
         kick energy into one bucket.
      2. **Reduction of single-band dominance.** The legacy 3-band
         split lumps kick and bassline into one bass channel, so the
         dominant instrument's envelope wins and the rest visually
         disappears. A sub-bass band gives the kick its own routable
         stream, which is the prerequisite for any effect that wants
         to drive different visual elements from kick vs bassline
         (cf. band-zone-pulse-effect's per-band peak detection).

      Both goals point the same way; that's what makes this worth
      trying first.

      ## Other directions worth trying if 4-band falls short

      Energy-equalized edges (eq3 at 113/266 Hz), Bark/mel pre-normalization aggregated to broad bands, overlapping/Hann-tapered soft edges, sqrt(f) whitening pre-split, or a per-band noise-floor gate.

