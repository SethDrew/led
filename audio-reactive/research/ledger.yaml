  - id: sustain-detection-energy-derivative
    date: 2026-03-23
    touched: 2026-03-23
    title: Sustain detection via smoothed energy derivative with 0.5 threshold
    summary: >
      Smoothed energy derivative (200ms EMA TC) with 0.5 threshold cleanly
      separates sustained notes (derivative <0.5) from true onsets (>1.0).
      Natural vocal wobble during sustained hum produces derivatives of 0.2-0.3,
      well below threshold. Initial threshold of 0.15 was too tight — wobble
      kept resetting the detector. Combined with energy > 0.05 gate and
      asymmetric ramp (0.35/s up, 1.0/s down), triggers reliably after ~1s
      sustain, resets within 500ms on energy change.
    status: validated
    warmth: high
    confidence: high
    source: audio-reactive/effects/flicker_flame_warmth.py
    tags: [feature-extraction, effects, perception]
    relates_to: [rolling-integral-sustained-energy, onset-vs-absint-comparison]
    notes: >
      Developed for the fire_flicker bulb effect (sustain-triggered blown-fire
      dropout). The key calibration insight: real onsets produce derivatives of
      1.0+ while vocal wobble stays at 0.2-0.3, giving 2x headroom at 0.5
      threshold. The 200ms EMA smoothing is critical — without it, frame-to-frame
      noise causes false triggers. The asymmetric ramp (slower attack than decay)
      means brief silence gaps don't accumulate false sustain, but stopping
      input resets quickly. Useful for any effect that should respond differently
      to sustained vs transient input.

  - id: raw-rms-sticky-blend
    date: 2026-03-23
    touched: 2026-03-23
    title: Mixing raw RMS into sticky-floor output preserves harmonic warmth
    summary: >
      Blending raw RMS back into sticky-floor-normalized energy (70% sticky +
      30% raw) preserves transient responsiveness while maintaining warmth from
      sustained harmonic content. Sticky floor alone acts as an implicit onset
      gate — it normalizes away sustained energy, causing the sculpture to go
      dark between beats even when harmonic content is present. The blend ratio
      is a tunable knob: more raw RMS = more sustained warmth, more sticky =
      sharper transient contrast.
    status: validated
    warmth: high
    confidence: high
    source: audio-reactive/effects/heat_diffusion.py
    tags: [feature-extraction, effects, perception]
    relates_to: [ema-section-boundary-contrast, feelings-are-contextual, derivatives-over-absolutes]
    notes: >
      Discovered during heat diffusion tuning. The sticky floor's fast-up /
      slow-down asymmetry makes it excellent for transient detection but blind
      to sustained harmonic energy. Between beats, the floor catches up to the
      RMS level and output drops to near zero — perceptually wrong when there's
      still musical content. The 70/30 blend was chosen empirically; the ratio
      could vary per effect or even adapt based on a rhythmic-ness classifier
      (more sticky for beat-driven, more raw for ambient/harmonic).

  - id: log-peak-decay-rhythmicness
    date: 2026-03-23
    touched: 2026-03-23
    title: Log-domain peak-decay of |d(RMS)/dt| is the best rhythmic-ness metric
    summary: >
      Compute log(1 + |d(RMS)/dt|), feed into peak-decay envelope (instant
      attack, 2s exponential decay). Remap [0.97, 2.29] → [0, 1]. Achieves
      clean separation: Bangarang loud sections 0.70-1.00, ambient ≤ 0.30,
      Four Tet screech 0.44-0.51 (correctly borderline). The log compresses
      volume differences without dividing by RMS — critical because ratio-based
      approaches fail on compressed/mastered music where beat swings are large
      in absolute terms but moderate relative to mean level.
    status: validated
    warmth: high
    confidence: high
    source: audio-reactive/viewer/viewer.py
    tags: [feature-extraction, perception, effects]
    relates_to: [raw-rms-sticky-blend, derivatives-over-absolutes, feelings-are-contextual, onset-vs-absint-comparison]
    notes: >
      Frame-to-frame (k=1, ~12ms) lookback is optimal; k=3 (35ms) has
      marginally better separation but hurts borderline tracks; k=5+ blurs
      beat pulses. ESP32 cost: 1 log + peak-decay per frame, 4 bytes state.
      Can serve as continuous 0-1 blend weight for onset-driven vs energy-driven
      effects, or use 0.50 as a binary threshold. Tested 8 alternative approaches
      including ratio-based (|dRMS|/meanRMS), dual-EMA self-normalizing,
      capped-rise variants, absint-ratio (200ms integration / 5s RMS), and
      OnsetTempoTracker autocorrelation confidence — all inferior. Ratio-based
      approaches fail on compressed music because ambient's derivative-to-RMS
      ratio looks similar to Bangarang's. Tempo confidence has 3x narrower
      separation gap (0.033 vs 0.200), false-positives on ambient textures,
      and costs 1,350x more ops on ESP32. The absolute scale is what separates
      beat from ambient, and normalization destroys it. The log provides partial
      volume adaptation (10x louder → ~2.3x higher, not 10x) without fully
      collapsing the separation.

  - id: novelty-method-comparison
    date: 2026-03-26
    touched: 2026-03-26
    title: Novelty method comparison — 6 approaches vs timbral section detector
    summary: >
      Compared 6 viewer novelty functions (feature flux, EMA deviation, Foote checkerboard,
      multi-scale EMA, cumulative z-score, KNN reservoir) against detect_timbral_sections
      across 5 tracks. Most are duplicative of existing validated approaches. Two capture
      fundamentally different information: Foote's checkerboard (offline O(n²)) detects
      structural boundaries via before-vs-after self-similarity — the only method that
      captures song form. Multi-scale EMA deviation offers drift analysis at ~3s/~1min/~5min
      timescales simultaneously. The remaining 4 (flux, naive EMA, z-score, KNN reservoir)
      overlap with existing approaches but haven't received proper independent assessment.
      Decision: detect_timbral_sections is the one production technique for now. Viewer
      novelty functions stay as analysis-only visualization tools, available for future
      exploration if a specific effect needs a different novelty axis.
    status: validated
    warmth: medium
    confidence: high
    source: audio-reactive/viewer/viewer.py
    tags: [feature-extraction, section-detection, architecture]
    relates_to: [timbral-shift-detection-eagerness, dual-ema-section-level-detection, perception-is-layered-by-timescale]
    notes: >
      Feature flux and EMA deviation overlap with AbsIntegral and detect_timbral_sections
      respectively, but may measure different things at different timescales — untested.
      Cumulative z-score (Welford's) asks "is this unusual relative to everything so far?"
      which could be distinct from EMA-based "unusual relative to recent context." KNN
      reservoir ("have I heard this exact timbre before?") is a genuinely different
      question — repetition detection — but hasn't been assessed for artistic value. Foote is genuinely
      different: it requires the full audio (non-causal), builds an O(n²) similarity
      matrix, and answers "do the next 3 seconds differ from the last 3 seconds?"
      That's structural analysis, not real-time novelty. Multi-scale EMA is worth
      revisiting if we build effects that need to respond differently at verse vs
      arc timescales. The timbral_section_detect.py file (5 algorithm variants) was
      deleted — winning algorithm moved to signals.detect_timbral_sections. All
      rejected variants (anchored-reference, dual-EMA, bucket-novelty v1/v2,
      core+candidate) documented in timbral-shift-detection-eagerness entry.

