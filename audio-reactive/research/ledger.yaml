  - id: input-role-taxonomy
    date: 2026-03-02
    touched: 2026-03-02
    title: "Effects should declare abstract input ROLES (EVENT, RATE, INTENSITY, MOOD...) not specific signals"
    summary: >
      Every parameter an effect consumes can be described by an abstract role —
      what KIND of input it needs — independent of which signal fills that role.
      13 roles identified: EVENT (discrete trigger), RATE (cyclic speed),
      INTENSITY (continuous level), MOOD (character/color quality), TRAJECTORY
      (direction of change), TEXTURE (categorical character), NOVELTY (deviation
      from context), DENSITY (how many things at once), SPACE (openness),
      POSITION (spatial mapping), FAMILIARITY (recognition), SURPRISE
      (unexpectedness of specific event), PHASE (position within cycle). Each
      role operates at multiple timescales. Separating role from signal enables
      swapping sources (audio features, user knobs, ML models, sensors) without
      changing effect code.
    status: exploring
    warmth: high
    confidence: medium
    source: synthesis of LD/VJ research, MIR literature, and existing ARCHITECTURE.md principles
    tags: [architecture, effects, abstraction, input-design]
    relates_to: [two-quality-axes, perception-is-layered-by-timescale, derivatives-over-absolutes, feelings-are-contextual]
    notes: >
      This is the most architecturally significant finding of the session. The
      role taxonomy creates a "routing table" between signals and effects — like
      DAW sends. One signal can route to multiple roles at different gains, one
      role can blend inputs from multiple signals. User knobs become just another
      signal source. Key composition patterns: EVENT+INTENSITY+POSITION
      (reactive sparkle), RATE+PHASE+MOOD (groove lock),
      INTENSITY+TRAJECTORY+MOOD (section painting),
      EVENT+SURPRISE+NOVELTY (intelligent reaction). TRAJECTORY is the critical
      gap role — most effects don't consume it because the streaming section
      detector doesn't exist yet.

  - id: sculpture-3d-vs-addressing-1d
    date: 2026-03-02
    touched: 2026-03-02
    title: "3D sculptures viewed from any angle are 2D screens — separate addressing (1D) from rendering (3D)"
    summary: >
      The 1D LED addressing constraint (strip index) is distinct from the 3D
      rendering opportunity (sculpture in physical space). A 3D sculpture viewed
      from any angle presents a 2D image — different viewers see different
      projections. Effects already use height mapping from sculptures.json (NOT
      raw strip index), but lack the lateral dimension (x,y positions). Adding
      approximate 3D coordinates would unlock cross-branch spatial effects
      (ripples, directional waves, proximity-based particle interactions) and
      correct "1D adaptation" ratings — many effects rated poorly for 1D
      actually work great on a 3D sculpture with spatial coordinates.
    status: exploring
    warmth: high
    confidence: medium
    source: analysis of sculptures.json topology data, review of effect spatial requirements
    tags: [architecture, topology, 3d, spatial]
    relates_to: [topology-native-effects-principle, input-role-taxonomy, diamond-topology]
    notes: >
      Three coordinate systems: Index space (1D array — hardware), Topology
      space (branch-relative with height — current), World space (x,y,z
      physical positions — missing). The tree sculpture has rich 3D structure
      but only height is mapped. Adding x,y coordinates (photograph from two
      angles, annotate key positions, interpolate) would unlock a whole class
      of effects. Different viewing angles creating different visual
      experiences is a feature unique to 3D sculptures — can't happen on a
      flat screen.

