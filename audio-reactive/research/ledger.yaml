  - id: perception-is-layered-by-timescale
    date: 2026-02-21
    touched: 2026-02-28
    title: "Perception is layered by timescale — each layer needs its own normalization"
    summary: >
      Listeners perceive multiple musical phenomena simultaneously, each
      operating at a different timescale: transient attacks (<1s), rhythmic
      patterns (~1-4s), phrase dynamics (~10s), section-level energy (~1min),
      and whole-song arcs (~5min). These aren't just the same signal at
      different zoom levels — they're different perceptual phenomena. A kick
      drum hit, a 4-bar build, and a 5-minute crescendo are different things
      you feel differently. A single normalization with one decay constant
      can only serve one layer. Capturing what humans actually hear likely
      requires multiple normalization techniques at multiple timescales,
      possibly with fundamentally different algorithm structures per layer.
    status: validated
    warmth: high
    confidence: high
    source: [library/ARCHITECTURE.md, audio-reactive/effects/energy_color.py]
    tags: [architecture, feature-extraction, perception]
    relates_to: [feelings-are-contextual, per-band-normalization-with-dropout-handling, rolling-integral-sustained-energy, normalization-events-separation, peak-decay-demand-charge-analogy]
    notes: >
      Concrete evidence: energy_color on 10-minute Chase & Status DnB with
      peak-decay 0.9995 (~46s half-life) produces binary 0/100% — ceiling and
      floor converge within a minute, erasing the multi-minute energy arc
      entirely. The listener hears builds, plateaus, and drops spanning minutes
      that the 46s window adapts away.
      Implication: arc-level normalization might use no adaptive tracking at all
      (raw integral with fixed reference), while beat-level needs fast peak-decay.
      These may not even belong under the same "normalization" umbrella — they're
      different operations serving different perceptual layers.

  - id: context-expensive-code-cheap
    date: 2026-02-21
    touched: 2026-02-21
