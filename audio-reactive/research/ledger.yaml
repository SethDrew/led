    title: "Nine interaction types for multi-entity effects on sculptures"
    summary: >
      Cataloged 9 ways entities (particles, orbs, organisms) can interact on a
      sculpture: collision (merge/bounce/annihilate/spawn),
      attraction/repulsion (gravity wells, flocking), communication (signal
      propagation, chain reaction), competition (territorial expansion,
      reaction-diffusion), symbiosis (mutual enhancement, resonance),
      predator/prey (chase/consume), synchronization (Kuramoto model, firefly
      sync), inheritance (parent spawns mutated children), decay/growth (aging,
      seasons, lifecycle). Each maps to specific audio roles and sculpture
      topologies. Tree topology is uniquely suited — trunk as gravity well,
      branches as escape routes, junctions as collision points.
    status: exploring
    warmth: high
    confidence: medium
    source: particle systems literature, cellular automata, boids/flocking, Kuramoto model, reaction-diffusion systems
    tags: [effects, particles, interactions, topology]
    relates_to: [topology-native-effects-principle, input-role-taxonomy, sculpture-3d-vs-addressing-1d]
    notes: >
      Most interaction types require at minimum branch identity (already have)
      and ideally 3D proximity (don't have yet). Synchronization is
      particularly interesting — builds could drive coupling strength (entities
      sync up during builds, desync during breakdowns), creating emergent order
      from chaos that mirrors the musical tension/release arc. Competition maps
      naturally to frequency bands competing for spatial territory on the
      sculpture.

