    source: design conversation
    tags: [architecture, philosophy]
    relates_to: [per-band-normalization-with-dropout-handling, normalization-prior-art-audit, perception-is-layered-by-timescale, event-detection-viewer-only]
    notes: >
      Emerged from trying to build dropout emphasis into the normalization
      algorithm (reference freeze, constant decay, recovery attack rates).
      Each addition made the algorithm harder to understand and test. The
      split clarified both sides: normalization is a solved problem (peak-decay),
      and dropout emphasis is a creative problem that needs its own design
      space in the events layer on the temporal axis.

      However, these could be recombined into a single algorithm if dropout
      detection and reintroduction emphasis is the primary focus. Baking
      level-tracking and event detection into one pass simplifies the system
      when you don't need the clean normalized signal for other consumers.
      Worth considering for a dedicated "dropout reactor" effect that owns
      the whole pipeline from raw band energy to LED output.

