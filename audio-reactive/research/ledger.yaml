  - id: spectrogram-gram-effects-need-2d
    date: 2026-03-27
    touched: 2026-03-28
    title: Spectrogram/MFCC-gram effects need a 2D display, not a 1D strip
    summary: >
      Hypothesis tested: raw spectrograms or MFCC-grams rendered spatially across LEDs would
      look cool. Result: not on a 1D LED strip. The core dilemma — allow fade to black and it
      strobes; prevent fade to black and it's just colors pulsing, which isn't compelling. The
      same data rendered on a screen (scrolling time axis) IS interesting — the time dimension
      is what makes spectrograms readable. Two viable screen paths: (1) render as a visual layer
      in a screen-based music visualizer (already done, looks good with timbre); (2) a 2D LED
      matrix where scrolling history is possible.
    status: validated
    warmth: medium
    confidence: high
    source: [audio-reactive/effects/mfcc_chroma_rainbow.py, audio-reactive/effects/mfcc_compare_dev.py]
    tags: [effects, perception, dead-end, feature-extraction]
    relates_to: [two-quality-axes, topology-native-effects-principle, rgb-color-gamut-limitations]
    notes: >
      Tested extensively by porting MFCC chroma rainbow from screen (shuffle3d) to LED strip.
      Additional structural problems beyond the strobe/pulse dilemma: bass dominates all MFCC
      coefficients via the DCT (harmonic series colonizes most mel bands), spatial gradient
      doesn't read on hardware due to LED diffusion, per-coefficient detail visible in a
      time-vs-position plot is invisible on a 60-150 LED strip at any instant.

      Attempted fixes: BR_DECAY tuning (6.93→2.31, reduced flicker but didn't solve
      representation issue), CMVN with per-mel-band EMA subtraction (per-coefficient AGC
      downstream neutralized it — 91% correlation between variants), global normalization
      (made treble dimmer not bass less dominant), sigmoid mapping on raw CMVN (k=1.0 improved
      evenness but MFCC1 still brightest in 67% of frames).

      The key insight: spectrograms and MFCC-grams are fundamentally time-series visualizations.
      A single time-slice projected onto a strip loses the temporal context that makes them
      readable. This generalizes beyond MFCCs — any frequency-decomposition-to-spatial-position
      mapping on a 1D strip will hit the same strobe-or-pulse dilemma.

