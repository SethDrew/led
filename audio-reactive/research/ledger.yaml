        material            source bass/mids   mic bass/mids   amp
        ------------------  -----------------  --------------  -----
        rap (bass-heavy)    2.6x               14.6x           5.6x
        classical (mids)    0.16x              0.27x           1.7x

      Likely cause: bass wraps around the mic body and reflects off
      room surfaces; mids/treble are more directional and lose more in
      free-field propagation.

      ## Per-band response is flat at near-ambient distance

      Classical (most spectrally-flat segment), per-band Δ dB:
      sub-bass -20, bass -19, mids -24, high-mid -24, treble -26.
      Spread 7 dB band-to-band — much flatter than the 3 ft validation
      (28 dB spread; see inmp441-validation-2026-04-26). No band falls
      into noise floor; per-band SNR gating is not required at this
      placement.

      ## Genre-dependent broadband makeup gain

      Peak-match gain to system: +11 dB (rap, bass-heavy) to +32 dB
      (rock, treble-rich). Follows from the mic's HF rolloff
      compounding with the bass-tilt amplification — a single broadband
      gain cannot normalize across genres, per-band normalization can.

  - id: inmp441-signal-impact
    date: 2026-03-17
    touched: 2026-03-17
    title: "INMP441 bass deficit fundamentally changes which signal primitives work"
    summary: >
      The INMP441's -28dB bass deficit (see inmp441-frequency-response)
      breaks three categories of audio signal differently: (1) bass-band
      signals become noise, (2) broadband signals lose their kick component
      and shift to treble-tracking, (3) per-band decomposition loses its
      lowest 2 bands. This is a signal-level problem, not an effect-level
      problem — any technique built on these primitives inherits the limitation.
    status: validated
    warmth: high
    confidence: high
    source: analysis of signal primitives against measured INMP441 frequency response
    tags: [hardware, microphone, inmp441, signal-processing, esp32]
    relates_to: [inmp441-frequency-response, taps-track-bass-peaks, onset-envelope-for-tempo, per-band-normalization-with-dropout-handling]
    notes: >
      Three signal categories, by impact:

      **Bass-band signals (broken):** Any signal derived from energy below
      ~250Hz — bass spectral flux, bass-band HPSS, low-frequency energy
      ratio — receives noise, not music. Kick drum detection via bass
      flux is impossible. This is the most damaging loss because kicks
      are the primary periodic signal for beat tracking (see
      taps-track-bass-peaks).

      **Broadband signals (degraded):** RMS, abs-integral (|d(RMS)/dt|),
      and broadband spectral flux still function because treble energy
      varies with the music. But the character changes — abs-integral
      peaks shift from kick-driven (groove) to hi-hat/snare-driven
      (accent). The feel is fundamentally different: the signal tracks
      rhythmic surface detail rather than rhythmic foundation.

      **Tempo trackers (degraded, genre-dependent):** All current trackers
      (onset-envelope, beat-predictor, fusion variants) rely on
      autocorrelation of onset or energy signals. Without bass, the
      strongest periodic component (kick pattern) is absent. Trackers
      may lock to hi-hat rate (correct or half-tempo depending on genre)
      or fail entirely on bass-heavy music (electronic, hip-hop). This
      worsens the octave ambiguity problem. Music with prominent treble
      periodicity (trap hi-hats, acoustic guitar strumming) fares better.

      **Spectral centroid (biased):** With bass energy absent, centroid
      sits permanently in the upper range. The warm-to-cool dynamic
      range compresses. Centroid still varies, but within a narrower,
      cooler band.

      **Per-band decomposition (collapsed):** A 5-band split loses its
      bottom 2 bands to noise. The effective decomposition is 3-band
      (low-mid, high-mid, treble). Band-share voting, dominant-band
      detection, and zone-mapped effects lose 40% of their range.

      **Key insight:** The degradation is at the signal primitive level,
      not the effect level. Any future effect using these same primitives
      will inherit the same limitations. ESP32 standalone effects should
      be designed around 3-band mid/high decomposition and treble-onset
      beat detection from the start, rather than adapting 5-band
      bass-dependent designs.

  - id: inmp441-normalization-limits
    date: 2026-03-17
    touched: 2026-03-17
    title: "Normalization fixes INMP441 amplitude deficit but cannot restore missing frequency content"
    summary: >
      The 24 dB overall level difference between INMP441 and system audio
      normalizes away trivially (peak-decay, EMA ratio, or simple gain).
      But normalization cannot fix the frequency imbalance: bass is -28 dB
      relative to system audio, so per-band normalization of the bass band
      just amplifies noise floor to full scale. The bass "signal" after
      per-band normalization is noise, not music.
    status: validated
    warmth: high
    confidence: high
    source: dual-capture measurement + normalization analysis
    tags: [hardware, microphone, inmp441, normalization, signal-processing, esp32]
    relates_to: [inmp441-frequency-response, inmp441-signal-impact, per-band-normalization-with-dropout-handling, ema-normalization-replaces-peak-decay, feelings-are-contextual]
    notes: >
      ## What normalization CAN fix

      - Overall amplitude: The 24 dB level difference is purely a gain
        issue. Any normalization scheme (peak-decay, EMA ratio, AGC)
        handles this transparently.

      - Relative dynamics within surviving bands: Treble and high-mid
        energy still varies with the music. Normalizing these bands
        independently produces usable 0-1 signals.

      ## What normalization CANNOT fix

      - Missing bass content: At -28 dB in the bass band (80-250 Hz),
        the SNR is effectively 0 dB. Per-band normalization amplifies
        noise to full scale, producing random triggers. This is the
        "amplifying nothing" problem — normalization cannot create
        information that was never captured.

      - Frequency balance: A kick drum produces a bass spike 10-20 dB
        above treble in system audio. Through the INMP441, that kick
        is at or below the noise floor while treble is at full level.
        No normalization restores this ratio.

      - Envelope shape: The 0.29 envelope correlation means the
        temporal pattern is different, not just quieter. The mic
        responds to different frequency content, producing a different
        waveform. Room acoustics further distort the envelope.

      - SNR: At 3.9 dB, noise is only ~2.5x below signal.
        Normalization amplifies both equally. Derivatives (abs-integral)
        will have significant noise contribution.

      ## Implications for ESP32 standalone

      Beat detection should shift from bass-tracking to treble-onset-
      tracking (hi-hat patterns, spectral flux in 2-8 kHz). Per-band
      decomposition should collapse to 3 bands (low-mid, high-mid,
      treble) since the lowest 2 bands are noise. The feelings-are-
      contextual principle still applies — deviations from running
      average still track musical events, just treble-dominated ones.

      Hardware mitigation: analog preamp with bass shelf (+20 dB below
      250 Hz) could partially compensate, but the MEMS element's
      mechanical rolloff may still limit recovery.

  - id: sticky-floor-adaptive-normalization
    date: 2026-03-18
    touched: 2026-03-18
    title: Asymmetric floor EMA + log-scale for room-adaptive brightness
    summary: >
      Noise floor EMA with asymmetric alpha (fast descent 4x, slow ascent 0.1x,
      30s base TC) paired with log dB mapping over a 15dB window produces
      room-adaptive audio-reactive brightness. Standard symmetric EMA floor
      drifts upward during sustained music, collapsing dynamic range. The
      asymmetric alpha fixes this — floor drops quickly when room quiets but
      resists rising when music plays, preserving the gap between ambient and
      peaks.
    status: validated
    warmth: high
    confidence: high
    source: []
    tags: [normalization, perception, brightness, hardware, tested]
    relates_to: [perception-is-layered-by-timescale, ema-normalization-replaces-peak-decay]
    notes: >
      Validated via 5 rounds of A/B testing on gyro color stick (50 LEDs split
      into halves, same color, different brightness pipelines). Key findings
      from the A/B rounds:

      - Log-scale beats sigmoid and linear for audio→brightness mapping.
        Ratio-based was too twitchy (tiny changes → huge swings), sigmoid+integral
        too sluggish, linear thresholds stayed too bright at idle.

      - 15dB window empirically matched to real-world INMP441 mic dynamic range
        in room settings. 30dB window was too wide — actual signal only spanned
        ~11dB, so brightness could only reach 37% of output range.

      - Asymmetric exponential decay (fast attack ~60ms, slow decay ~5s) preferred
        over linear decay. The lingering exponential tail feels natural — energy
        enters the system quickly and fades slowly.

      - Peak vs RMS: indistinguishable under log compression. Log mapping absorbs
        the peak/RMS difference. Peak chosen for simplicity.

      The technique is not specific to gyro stick — any mic-based brightness
      effect in any room benefits from adaptive floor tracking that resists
      upward drift during sustained sound.

