  # ── Feature Extraction ───────────────────────────────────────────

  - id: derivatives-over-absolutes
    date: 2026-01-15
    touched: 2026-02-10
    title: Rate-of-change matters more than absolute values
    summary: >
      Build vs climax has identical static features (RMS ±0.5%) but climax
      brightens 58x faster. The derivative is the signal, not position.
    status: validated
    warmth: high
    confidence: high
    source: research/analysis/taste/build_vs_climax.md
    tags: [feature-extraction, derivatives, brightness]
    relates_to: [build-taxonomy]
    notes: >
      First major insight. Changed thinking about all feature extraction.
      Validated on fa_br_drop1.wav. Needs testing on more songs.

  - id: feelings-are-contextual
    date: 2026-01-18
    touched: 2026-02-27
    title: "Feelings are contextual — deviation from local norm, not absolute thresholds"
    summary: >
      Subjective musical qualities emerge from deviation from the surrounding
      context, not from absolute acoustic properties. Use deviation-from-running-
      average, not fixed thresholds.
    status: validated
    warmth: high
    confidence: high
    source: research/analysis/taste/air_feature_analysis.md
    tags: [feature-extraction, context, feelings, perception]
    relates_to: [feeling-layer-human-loop, perception-is-layered-by-timescale]
    notes: >
      Feelings are relative to context, not absolute acoustic properties.
      A synth pad feels "open" after a dense section but "flat" after silence.
      The principle generalizes to all subjective qualities — they're
      comparisons, not measurements.

  - id: taps-track-bass-peaks
    date: 2026-01-20
    touched: 2026-02-15
    title: User taps track bass peaks (19ms median), not library onsets
    summary: >
      Only 48.5% of user taps align with librosa onsets. Users switch tracking
      modes across sections (centroid in intro, flux in groove).
    status: validated
    warmth: medium
    confidence: high
    source: research/analysis/taste/beat_tap_analysis.md
    tags: [beat-detection, taps, onsets, bass, user-data]
    relates_to: [tactus-ambiguity, onset-vs-flux, flourish-ratio]
    notes: >
      Implication: library onset detection may be low-value for LED triggering.
      User perception of "beat" is more complex than any single feature.

  - id: build-taxonomy
    date: 2026-01-22
    touched: 2026-02-10
    title: "Build phases: primer, sustained, bridge, drop"
    summary: >
      Four independent build phases. Bridge has HIGHER RMS than drop.
      Drop is sustained intensity, not peak intensity.
    status: validated
    warmth: high
    confidence: high
    source: research/analysis/taste/fa_br_drop1_analysis.md
    tags: [feature-extraction, builds, song-structure, energy]
    relates_to: [derivatives-over-absolutes]
    notes: >
      Primer = cyclic ramps, sustained = upward trajectory, bridge = chaos,
      drop = sustained plateau. All phases independent, not sequential.
      Validated on fa_br_drop1.wav.

  - id: energy-states-full-taxonomy
    date: 2026-03-02
    touched: 2026-03-02
    title: "23+ distinct energy states exist beyond build/drop/breakdown, each with measurable acoustic correlates"
    summary: >
      Academic MIR research and production theory reveal far more than 3 energy
      states. High-energy: drop/climax (sustained high RMS), bridge/chaos
      (HIGHEST RMS + high flux), euphoria (high arousal + high valence),
      aggression (high arousal + low valence). Medium-energy: sustained build
      (positive RMS slope — critically, static features are nearly identical to
      climax, only the derivative distinguishes them), groove (high onset density
      + strong autocorrelation), accent (sparse transients), harmonic (sustained
      chords). Low-energy: breakdown (band dropout), ambient (low density,
      spatial), melancholy. Transitional: primer (cyclic ramps), riser
      (frequency sweep), dropout-to-reintroduction, crescendo, section boundary.
      Each state has specific acoustic correlates that can be measured in
      real-time.
    status: validated
    warmth: high
    confidence: high
    source: ISMIR papers on structural segmentation, EDM drop detection, Russell's circumplex model (14k citations), Berkeley emotion research (13 emotions), Spotify audio features API, MIR toolkits (librosa, essentia, madmom)
    tags: [audio-analysis, architecture, energy, emotion, feature-extraction]
    relates_to: [derivatives-over-absolutes, feelings-are-contextual, perception-is-layered-by-timescale, build-taxonomy]
    notes: >
      The critical finding reinforcing derivatives-over-absolutes: build vs
      climax have RMS within +/-0.5% but climax brightens 58x faster. Static
      features fail to distinguish them — only the derivative works. Tension is
      created by rising pitch, increasing density, filter opening, harmonic
      dissonance, rhythmic acceleration, and increasing compression (dropping
      crest factor). The adaptation time constant IS the temporal scope —
      computing a feature relative to a 5-second running average means you're
      operating at phrase scope.

