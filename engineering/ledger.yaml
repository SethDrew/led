# Engineering Ledger
# Physical facts about our hardware: LEDs, controllers, chips, electricity, protocols on the wire.
# Guide: engineering/LEDGER_GUIDE.md

entries:

  # ── Hardware Constraints: Serial & UART ──────────────────────────

  - id: nano-uart-interrupt-collision
    date: 2026-03-03
    touched: 2026-03-03
    title: "ATmega328 UART overflows during strip.show() interrupt blackout"
    summary: >
      ATmega328 has a 64-byte UART hardware buffer. strip.show() disables interrupts
      for N_LEDs × 30µs (e.g. ~2.2ms for 73 LEDs). At 1Mbps, ~100 bytes/ms arrive
      during the blackout, overflowing the buffer. Lost bytes corrupt frame boundaries.
    status: resolved
    severity: high
    scope: hardware
    source: []
    tags: [nano, uart, neopixel, ws2812b, constraint, timing]
    relates_to: [nano-uart-overflow-led-limit, ws2812b-timing-architecture]
    notes: >
      The collision is between two hardware facts:
      1. WS2812B bit-banging requires interrupts disabled for the entire strip.show() duration
      2. ATmega328 UART has only 64 bytes of hardware FIFO — no DMA, no deeper buffer

      At 1Mbps with 73 LEDs: 2.2ms blackout × 100 bytes/ms = 220 bytes arriving,
      but only 64 can be buffered. The rest are silently dropped by hardware.

      ESP32 avoids this: RMT peripheral drives NeoPixels without disabling interrupts,
      and UART FIFO is deeper (128+ bytes).

  - id: nano-uart-overflow-led-limit
    date: 2026-03-04
    touched: 2026-03-04
    title: "ATmega328 streaming capped at ~150 LEDs due to UART overflow"
    summary: >
      strip.show() disables interrupts for N×30µs. Combined with 64-byte UART buffer,
      this limits how many LEDs a Nano can drive while receiving serial data.
      At 1Mbps: ~80 LEDs practical (with frame drops). At 115200: ~120 LEDs at 30fps.
      Beyond ~150 LEDs, use ESP32 (RMT, no interrupt blocking).
    status: resolved
    severity: high
    scope: hardware
    source: []
    tags: [nano, uart, neopixel, ws2812b, constraint, measurement]
    relates_to: [nano-uart-interrupt-collision, ws2812b-timing-architecture, esp32-hardware-selection-rationale]
    notes: >
      Formula: bytes_during_show = baud_rate / 10 × (N_LEDs × 30µs).
      Must be ≤ 64 (ATmega328 UART hardware buffer).

      Measured data points:
        80 LEDs, 1Mbps:  240 bytes during 2.4ms show → overflows, occasional drops
        80 LEDs, 115200:  28 bytes during 2.4ms show → safe, ~47 FPS max
       300 LEDs, 1Mbps:  900 bytes during 9ms show → catastrophic, nearly 0% valid
       300 LEDs, 57600:   52 bytes during 9ms show → safe, but only ~6 FPS
       150 LEDs, 1Mbps:  450 bytes during 4.5ms show → overflows, heavy drops
       150 LEDs, 115200:  52 bytes during 4.5ms show → safe, ~25 FPS

      ATmega328 also has only 2KB RAM. 300 LEDs × 3 bytes × 2 (double buffer) =
      1800 bytes, leaving almost nothing for stack/variables.

      ESP32 avoids both problems: RMT peripheral (no interrupt blocking), 320KB RAM.

  - id: ch340-no-unique-serial
    date: 2026-03-04
    touched: 2026-03-04
    title: "CH340 USB-serial chips have no unique serial number"
    summary: >
      All Arduino Nano CH340 clones enumerate as VID 1a86 PID 7523 with no unique
      serial. When multiple are plugged in, macOS assigns /dev/cu.usbserial-* ports
      based on USB topology (hub port), not device identity. Unplugging and replugging
      in different order swaps port assignments. EEPROM-based device ID protocol
      works around this.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [nano, ch340, constraint, deployment]
    relates_to: [diamond-sculpture-hardware-spec]
    notes: >
      CH340 is a cheap USB-serial bridge with no unique identifier in its USB descriptor.
      FTDI chips have unique serial numbers; CH340 does not. This is a hardware limitation
      of the chip itself — no firmware or driver change can add one.

      Impact: any multi-controller setup using CH340 Nanos cannot reliably identify
      which physical device is on which port. Port assignments are unstable across
      plug/unplug cycles.

      Workaround: store a device ID in ATmega328 EEPROM (1 byte, persists across power
      cycles). Query each port at startup to match device to port. This uses the
      ATmega328's 1KB EEPROM, not the CH340 itself.

  # ── WS2812B Protocol & Timing ────────────────────────────────────

  - id: ws2812b-timing-architecture
    date: 2026-03-03
    touched: 2026-03-03
    title: "WS2812B requires precise bit-level timing during transmission"
    summary: >
      WS2812B protocol requires 800kHz bit-level timing (1.25µs per bit, 30µs per LED).
      On ATmega328, this forces interrupts disabled for the entire strip.show() duration.
      ESP32 RMT peripheral handles this in hardware without blocking the CPU.
    status: resolved
    severity: high
    scope: hardware
    source: []
    tags: [ws2812b, timing, neopixel, constraint]
    relates_to: [nano-uart-interrupt-collision]
    notes: >
      WS2812B is a one-wire protocol with strict timing tolerances. Each bit is
      encoded as a high pulse of either 0.4µs (0) or 0.8µs (1), followed by low.
      Total 1.25µs per bit, 30µs per LED (24 bits RGB).

      On ATmega328 (Arduino Nano): no hardware peripheral for this — bit-banging
      in a tight loop with interrupts disabled. Any interrupt during transmission
      corrupts the timing and causes visual glitches.

      On ESP32: RMT (Remote Control) peripheral generates the waveform in hardware
      via DMA. CPU is free during transmission. This is why ESP32 can drive LEDs
      and receive serial simultaneously without conflicts.

  - id: ws2812b-hue-shift-low-brightness
    date: 2026-03-03
    touched: 2026-03-03
    title: "WS2812B shifts hue at low brightness due to 8-bit quantization"
    summary: >
      Colors with unequal RGB ratios (e.g. orange R255 G140 B0) shift hue during
      fade-out because smaller channels round to 0 before larger ones in uint8.
      This is intrinsic to 8-bit PWM — 256 steps per channel.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [ws2812b, color, quantization, constraint]
    relates_to: [ws2812b-gamma-correction]
    notes: >
      Example: orange fading at brightness 0.02 → R5 G3 B0 → R3 G1 B0 →
      R1 G0 B0 (now red) → R0 G0 B0 (black). The green channel disappears
      before red, shifting the apparent hue toward red before going dark.

      This is a fundamental limitation of 8-bit PWM. Every mixed color will
      shift hue during fade-out because RGB channels can't maintain their ratio
      with only 256 integer steps. Hardware alternatives: SK6812 RGBW (4th
      channel), or temporal dithering for effective 16-bit resolution.

  # ── Hardware Specifications & Deployment ────────────────────────

  - id: diamond-sculpture-hardware-spec
    date: 2026-03-03
    touched: 2026-03-03
    title: "Diamond sculpture hardware specification"
    summary: >
      73 LEDs across 3 branches (42 up + 20 down + 11 up). Arduino Nano CH340.
      Uses existing sculpture_stream PlatformIO env (80 pixels, NEO_RGB, 1Mbps).
      Branch indices: [0, 42, 62]. Branch 3 (up2) uses gamma=0.55 for height alignment.
    status: resolved
    severity: high
    scope: hardware
    source:
      - audio-reactive/hardware/sculptures.json
      - firmware/strip/platformio.ini
    tags: [hardware, deployment, sculpture, nano, ch340]
    relates_to: [diamond-topology, gamma-topology-compensation]
    notes: >
      Physical configuration:
      - Total: 73 LEDs, 3 branches
      - Branch 1 (up1): 42 LEDs, index 0-41
      - Branch 2 (down): 20 LEDs, index 42-61
      - Branch 3 (up2): 11 LEDs, index 62-72
      - Controller: Arduino Nano CH340
      - Data pin: varies by deployment (check sculptures.json)
      - Protocol: [0xFF][0xAA][RGB x 73][XOR checksum] at 1Mbps, 30 FPS

      Firmware: Use sculpture_stream environment in firmware/strip/platformio.ini.
      Configured for 80 pixels (gives headroom), NEO_RGB color order, 1Mbps serial.

      Topology mode: height-mapped. Logical LED array mapped across branches sharing
      common height axis. Branch 3 uses gamma=0.55 to compensate for non-linear
      physical geometry (see gamma-topology-compensation).

      Deployment checklist:
      1. Verify sculptures.json matches physical wiring (branch indices, pin assignment)
      2. Flash firmware/strip with sculpture_stream env
      3. Test serial connection at 1Mbps (wrong baud = garbage)
      4. Verify XOR checksum enabled in both firmware and runner.py

  - id: gamma-topology-compensation
    date: 2026-03-03
    touched: 2026-03-03
    title: "Gamma curves for non-uniform branch geometry"
    summary: >
      Physical LED branches rarely have uniform height distribution. Per-branch
      gamma parameter (gamma < 1) compresses base, stretches peak to align visual
      zones with physical geometry. Diamond branch 3 uses gamma=0.55 to shift
      zone boundaries ~2 LEDs downward.
    status: resolved
    severity: low
    scope: firmware
    source:
      - audio-reactive/hardware/sculptures.json
      - audio-reactive/effects/runner.py
    tags: [topology, gamma, sculpture, mapping, design-decision]
    relates_to: [gamma-height-curve, diamond-sculpture-hardware-spec]
    notes: >
      Applied in runner.py apply_topology() during height-mode rendering. Default
      gamma=1.0 (linear mapping). Configurable per-branch in sculptures.json.

      How it works: For a branch rising steeply at base then leveling off at top,
      logical height h is mapped to physical position as h^gamma before indexing
      into LED array. Gamma < 1 makes low values rise faster (compressed base),
      high values rise slower (stretched peak).

      Example: Diamond branch 3 has 11 LEDs but rises same physical height as
      42-LED branch 1. Without correction, zone boundaries appear misaligned.
      gamma=0.55 shifts boundaries ~2 LEDs downward for visual coherence.

      This is a deployment-time calibration parameter. Measure physical heights,
      render test pattern (e.g. three zones), adjust gamma until zone boundaries
      visually align across branches. No code changes needed — edit sculptures.json.

  - id: esp32-hardware-selection-rationale
    date: 2026-03-03
    touched: 2026-03-03
    title: "ESP32 vs STM32: why ESP32 for standalone audio-reactive"
    summary: >
      ESP32 chosen for 197-LED tree because WiFi is needed for web viewer, dual-core
      240MHz handles audio + LEDs, and community support is strong. STM32 has better
      real-time (DMA flush without CPU) but no WiFi/BT and only matters at 500+ LEDs.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [esp32, stm32, hardware, design-decision]
    relates_to: [stm32-vs-esp32, ws2812b-timing-architecture]
    notes: >
      Comparison:
      - ESP32: WiFi+BT built-in, dual-core 240MHz, RMT peripheral for WS2812B,
        good-enough real-time, $4-8, huge community, Arduino/PlatformIO mature.
      - STM32: No WiFi/BT (needs external W5500 for Ethernet), better real-time via
        DMA (flushes WS2812B without CPU), huge variant family, $2 Blue Pill, but
        steeper learning curve and less audio-reactive ecosystem.

      Decision: ESP32 is right for standalone audio-reactive at our scale (197 LEDs).
      WiFi needed for web viewer, real-time is good enough (RMT peripheral handles
      WS2812B timing without blocking CPU for long periods like Arduino Nano).

      STM32 becomes relevant for distributed architectures beyond ~500 LEDs, where
      you want cheap branch controllers doing one job (like Tree of Ténéré: 208
      STM32 Blue Pills + W5500 Ethernet for 175K LEDs). At that scale, STM32's
      deterministic real-time and per-unit cost ($2 vs $8) justify the complexity.

      ESP32 WiFi stack can occasionally steal CPU cycles, making real-time slightly
      less deterministic than STM32 DMA, but this is irrelevant for 197 LEDs at
      30 FPS. If upgrading past ~500 LEDs on single controller, reconsider.

  - id: nano-5v-power-required
    date: 2026-03-04
    touched: 2026-03-05
    title: "Arduino Nano requires dedicated 5V power for flashing and runtime"
    summary: >
      Arduino Nano (CH340) crashes during firmware upload (avrdude fails) when
      powered only through the computer's USB port. Needs a dedicated 5V supply
      to the 5V pin for successful flashing and stable runtime. Without it:
      flashing crashes mid-upload, runtime shows erratic behavior and serial corruption.
    status: resolved
    severity: high
    scope: deployment
    source: []
    tags: [nano, ch340, power, hardware, deployment, flashing]
    relates_to: [diamond-sculpture-hardware-spec, ch340-no-unique-serial]
    notes: >
      The Nano draws significant current during firmware upload — the CH340
      USB-serial chip, ATmega328 flash write cycles, and any connected LEDs
      all compete for power. Computer USB ports (especially through hubs)
      may not supply enough current, causing voltage drops that crash the
      upload mid-way.

      This is a hard blocker for deployment: you cannot flash new firmware
      without dedicated 5V power. Always connect a separate 5V supply before
      running pio run --target upload. This also affects EEPROM device ID
      assignment (see ch340-no-unique-serial) since that requires a
      successful flash first.

  # ── WS2812B Color & Gamma ────────────────────────────────────────

  - id: ws2812b-gamma-correction
    date: 2026-03-03
    touched: 2026-03-06
    title: "WS2812B lacks hardware gamma correction"
    summary: >
      WS2812B driver ICs use linear PWM with no hardware gamma correction.
      Human vision is logarithmic, so colors look wrong without software gamma.
      8-bit quantization compounds the problem: after gamma correction, the first
      ~28 input values all map to output 0 (dead zone).
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [ws2812b, gamma, color, quantization, constraint]
    relates_to: [ws2812b-hue-shift-low-brightness, cob-strip-color-mixing-differs]
    notes: >
      Two stacked hardware limitations:

      1. **No gamma correction**: LED driver ICs apply PWM linearly. Monitors/OS
         handle gamma transparently; WS2812B doesn't. Result: color mixing is wrong
         at the hardware level — orange appears yellow, warm tones are off.

      2. **8-bit PWM quantization**: Only 256 brightness steps per channel. After
         applying gamma correction (exponent ~2.8), the first ~28 input values all
         map to 0 output. Values 28-40 map to 1, which in integer math
         (color * 1 / 255) produces 0 — extending the dead zone to ~16% of the
         brightness range. Pastels and subtle warm tones are destroyed.

      These are intrinsic to the WS2812B IC. Hardware alternatives:
      - **SK6812 RGBW**: Adds 4th white channel (3000K/4000K/6000K), helps with
        pastels and warm tones. Drop-in compatible wiring.
      - **Physical diffusion**: Milky acrylic diffuser spatially averages adjacent
        pixels, providing free spatial dithering for smoother gradients.

  - id: cob-strip-color-mixing-differs
    date: 2026-03-05
    touched: 2026-03-05
    title: "COB strips need different gradient/color mixing approach than discrete LEDs"
    summary: >
      COB (Chip-on-Board) strips produce a continuous diffused light line rather than
      discrete dots. Gradients and color transitions that look good on individual WS2812B
      LEDs don't translate directly — COB's physical light blending between adjacent
      pixels changes how color mixing and spatial gradients appear. Engineering gradient
      rendering for COB needs its own tuning separate from discrete strip effects.
    status: identified
    severity: medium
    scope: hardware
    source:
      - audio-reactive/hardware/sculptures.json
    tags: [cob, ws2811, color, constraint]
    relates_to: [ws2812b-gamma-correction, ws2812b-hue-shift-low-brightness]
    notes: >
      COB strips (our sculpture uses WS2811 12V, 80 pixels) physically diffuse light
      between adjacent pixel zones. This means:

      1. **Spatial blending is free**: Adjacent pixels' colors physically mix in the
         diffuser material. Sharp color boundaries in the data become soft gradients
         on the strip. Effects that rely on crisp per-pixel color separation (e.g.
         alternating colors) will look muddied on COB.

      2. **Gradients need fewer steps**: Because hardware blending fills in between
         pixels, software gradients can use wider color steps without visible banding.
         Conversely, subtle per-pixel gradients that look smooth on discrete LEDs are
         wasted on COB — the hardware blending already does the interpolation.

      3. **Color mixing artifacts differ**: On discrete WS2812B, adjacent red and
         blue pixels look like distinct dots. On COB, they physically blend to purple
         in the gap. This changes which color palettes and transitions work well.
         Warm-to-cool gradients may need wider pixel spacing on COB to maintain
         distinct color zones.

      Implication: what looks good on discrete WS2812B (diamond) won't necessarily
      look the same on COB. Different physical light behavior.

  # ── ESP32-C3 Single-Core Constraints ───────────────────────────

  - id: esp32-c3-single-core-web-blocking
    date: 2026-03-12
    touched: 2026-03-12
    title: "ESP32-C3 single-core: synchronous WebServer blocks LED render loop"
    summary: >
      The Arduino WebServer library's handleClient() is fully synchronous and blocks
      the entire render loop on ESP32-C3 (single-core RISC-V). Measured 15-second page
      load times. Unlike dual-core ESP32, there is no second core to offload web handling.
      ESPAsyncWebServer (ESP32Async fork v3.10.1) eliminates loop blocking — page loads
      drop to 0.5s, API calls to 37ms, LED animation unaffected during web requests.
    status: resolved
    severity: high
    scope: hardware
    source:
      - festicorn/src/main.cpp
      - festicorn/platformio.ini
    tags: [esp32, esp32-c3, constraint, single-core, webserver, performance]
    relates_to: [esp32-hardware-selection-rationale, ws2812b-timing-architecture]
    notes: >
      The ESP32-C3 has a single RISC-V core (vs dual Xtensa on ESP32). This means:

      1. No core pinning — WiFi stack, web server, and LED rendering all share one core
      2. Synchronous WebServer::handleClient() has an internal delay(1) per call when
         idle (~1ms overhead per loop iteration), and blocks entirely during HTTP parsing
         and response delivery
      3. ArduinoOTA also fails — port 3232 becomes unresponsive because the OTA handler
         can't run frequently enough on the congested single core

      Solution stack:
      - ESP32Async/AsyncTCP + ESP32Async/ESPAsyncWebServer (v3.10.1)
      - ayushsharma82/ElegantOTA (v3.1.7) with -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
      - ElegantOTA serves browser-based OTA at /update (no UDP port 3232 needed)

      Important: the original me-no-dev/ESPAsyncWebServer has crash bugs on C3
      (StringArray.h delete bug causing "Load access fault"). The mathieucarbou fork
      was archived Jan 2025. ESP32Async is the active successor.

      Measured before/after (butterfly sculpture, 150 LEDs):
      - Page load: 15s → 0.5s (subsequent), 2s (cold)
      - /status API: unmeasured → 37ms
      - LED FPS: ~47 FPS unchanged (loop no longer contains handleClient or OTA.handle)
      - RAM: 43.9KB → 40.5KB (async uses less RAM than sync WebServer)

  # ── SK6812 RGBW Characteristics ─────────────────────────────────

  - id: sk6812-w-channel-worse-low-brightness
    date: 2026-03-17
    touched: 2026-03-17
    title: "SK6812 W channel has worse low-brightness stepping than RGB channels"
    summary: >
      SK6812 RGBW uses strictly linear 8-bit PWM (1:256 dynamic range) on all
      channels. Unlike WS2812 RGB, which has an undocumented nonlinear internal
      mapping giving 1:2048 effective range (per cpldcpu measurements), SK6812
      has no such compensation. The W channel shows more visible stepping than
      RGB during low-brightness fades — confirmed by A/B test on same strip.
    status: resolved
    severity: medium
    scope: hardware
    source:
      - https://cpldcpu.com/2022/08/15/does-the-ws2812-have-integrated-gamma-correction/
    tags: [sk6812, rgbw, quantization, constraint, low-brightness]
    relates_to: [ws2812b-gamma-correction, ws2812b-hue-shift-low-brightness, delta-sigma-eliminates-low-brightness-flicker]
    notes: >
      cpldcpu (Tim) measured SK6812 PWM output vs input and found strictly linear
      mapping. WS2812 by contrast maps 8-bit input to internal 11-bit PWM values —
      an undocumented feature that improves low-end dimming. SK6812 PWM frequency
      is 1.2kHz (per datasheet). Data rate is 800kHz (4 bytes RGBW per pixel,
      32 bits × 50 LEDs = 2ms wire time + 80μs reset).

      ## Hardware constraint and software compensation

      The SK6812's linear 8-bit PWM means each channel has exactly 256 brightness
      levels with uniform spacing. At the low end (values 0–10), these steps are
      perceptually large — the jump from 0→1 is 0.4% of full output, from 1→2
      is another 0.4%. Human vision has ~1% JND (just-noticeable difference) at
      these levels, so every step is visible.

      The 1.2kHz internal PWM frequency means the LED refreshes its duty cycle
      ~1200× per second. Software temporal dithering at 300–480 fps creates an
      amplitude modulation envelope that the LED faithfully reproduces. Ordered
      dithering (e.g., 16-phase) creates periodic ripple at fps/phases = 18.75 Hz
      — visible. First-order delta-sigma modulation creates aperiodic noise-shaped
      ripple with no detectable frequency — invisible to the eye.

      ## Resolution: W channel is sufficient with delta-sigma

      A/B test compared delta-sigma on W-only vs delta-sigma on R+G+B warm white.
      Both were flicker-free. Multi-channel RGB spreading is unnecessary when
      delta-sigma is applied — the dithering technique matters more than channel
      count. The W channel's warm white phosphor is the preferred output for
      glow/breathe effects (correct color temperature, single-channel simplicity).

      See research ledger: delta-sigma-eliminates-low-brightness-flicker for the
      full dithering pipeline specification.

      ## Hardware alternatives

      WS2816 has native 16-bit PWM (65536 levels) with 10kHz refresh and built-in
      4-bit gamma — eliminates the dithering problem in hardware. Worth considering
      if dimming quality is paramount and software complexity is a concern.

      ESP32-C3 test setup: 50 SK6812 RGBW LEDs on pin 10, Adafruit NeoPixel.

  - id: rgbw-pure-w-at-low-brightness
    date: 2026-03-22
    touched: 2026-03-23
    title: Pure W channel at low brightness eliminates RGB die strobe on SK6812 RGBW
    summary: >
      At low brightness (<25%) on SK6812 RGBW, outputting unequal RGB channels
      causes visible strobe on the weaker dies (green, blue) as they toggle between
      0 and 1 in uint8. Fix: below a brightness threshold, output equal-channel RGB
      (e.g. 170,170,170) so the firmware's min(R,G,B) → W conversion puts ALL light
      on the dedicated warm white LED with zero residual RGB. Above the threshold,
      smoothly blend in the actual color. Alternatively, with direct RGBW control,
      shift all light to the W channel below the threshold with RGB=0.
    status: resolved
    severity: high
    scope: hardware
    source:
      - audio-reactive/effects/compare.py
      - festicorn/bulbs/src/receiver.cpp
    tags: [sk6812, rgbw, low-brightness, constraint]
    relates_to: [sk6812-w-channel-worse-low-brightness]
    notes: >
      The SK6812 RGBW has four separate dies (R, G, B, W). At low brightness,
      small uint8 values on R/G/B channels toggle between 0 and 1 at the PWM
      refresh rate — visible as strobe on the weaker channels. The W channel's
      single warm white die handles low-brightness smoothly with delta-sigma
      dithering. The fix: below ~25% brightness, route all light to the W
      channel only. Above threshold, smoothly blend in RGB color. This
      complements delta-sigma dithering — dithering smooths the W fade,
      this technique avoids RGB dies entirely where they're unstable.

      Discovered during interactive bulb effect tuning. With unequal RGB
      (180,170,160), firmware RGBW conversion extracts min=160 as W,
      leaving residual R=20, G=10, B=0. Green toggles 0↔1 visibly.

  # ── Hardware Constraints: ESP32-C3 Super Mini RF ────────────────

  - id: esp32-c3-super-mini-tx-defect
    date: 2026-04-14
    touched: 2026-04-14
    title: ESP32-C3 Super Mini has batch PCB antenna defect causing dead TX at full power
    summary: >
      Cheap ESP32-C3 Super Mini clones have a known batch defect: the crystal is
      placed ~0.3mm from the ceramic antenna (spec minimum: 1.0mm). At full TX
      power (20dBm, ~500mA peak), the marginal 3.3V regulator sags, corrupting RF
      output. Boards receive perfectly but transmit nothing. Fix: reduce TX power
      to 8.5dBm with WiFi.setTxPower(WIFI_POWER_8_5dBm) — restores TX from 0% to
      98-99% delivery. 35dB link margin at 10m indoor, so range is not a concern.
    status: mitigated
    severity: high
    scope: hardware
    source:
      - festicorn/bulbs/src/espnow_lowpower_test.cpp
    tags: [esp32, esp32-c3, super-mini, antenna, constraint, esp-now]
    relates_to: [esp32-hardware-selection-rationale]
    notes: >
      Confirmed 2026-04-14 on C3-BoardB (MAC 10:00:3B:B0:6E:04). At default 20dBm:
      SoftAP beacons invisible to all scanners, ESP-NOW 0/50+ packets delivered
      (send callback falsely reports SUCCESS — broadcast has no ACK). At 8.5dBm:
      350/354 packets = 99% delivery. Tested across two independent ESP32 receivers.

      The defect is TX-only and power-dependent: the PA drives enough energy that the
      crystal couples with the antenna, creating destructive interference. Lower power
      stays below the coupling threshold. SoftAP beacons remain invisible even at
      8.5dBm (frame-type dependent — management frames more affected than data frames).

      Board-by-board status (2026-04-14):
        C3-BoardA (D9:CC): works at full power, 93-95% at 8.5dBm
        C3-BoardB (6E:04): dead at full power, 98-99% at 8.5dBm (confirmed defect)
        C3-New (5D:10): works at full power, 98-99% at 8.5dBm
        C3 F5:F8: dead TX (not retested, likely same defect)

      TX power threshold on C3-BoardB: 15.75dBm works (99%), 16.0dBm breaks (0%).
      This is a cliff edge, not gradual — confirms regulator brownout, not antenna
      attenuation. ESP32 driver may quantize internally (63→60, 64→68), so the real
      safe maximum is WIFI_POWER_15dBm (txPow=60). Using 8.5dBm gives 7dBm headroom.

      Workaround: add WiFi.setTxPower(WIFI_POWER_8_5dBm) to ALL C3 Super Mini
      firmware as standard. Screen boards with SoftAP test at full power to identify
      affected units. For future orders, consider Seeed XIAO ESP32-C3 (~$5, external
      antenna, proper QC) or C3 Super Mini Plus (IPEX connector for external antenna).

      Link budget at 8.5dBm, 10m indoor: 8.5 - 60 (FSPL) - 10 (indoor margin) =
      -61.5 dBm received. ESP32 sensitivity ~-97 dBm. Margin = 35.5 dB. Sufficient
      for interactive sculpture with people crowding around it.

      The initial 5-board simultaneous test produced a misleading "marginal TX"
      diagnosis for C3-New — this was actually broadcast collision congestion from
      5 simultaneous broadcasters, not hardware weakness. In isolated pair testing,
      C3-New delivers 93-99%.

  # ── ESP32 RMT Throughput for WS2812B ───────────────────────────

  - id: esp32-rmt-8-channel-parallel-ws2812b
    date: 2026-04-17
    touched: 2026-04-17
    title: "ESP32 RMT drives 8 WS2812B channels in true parallel"
    summary: >
      Classic ESP32 (Xtensa) has 8 independent RMT channels, each with its own
      GPIO mux, clock divider, and block RAM. Eight WS2812B strips driven from
      eight channels transmit concurrently with no hardware contention — total
      wire time equals a single strip's wire time, not 8× summed. Measured on
      ESP32-D0WD-V3, 8 strips × 100 LEDs: 3.14ms total transmit (vs 3.05ms
      WS2812B floor for 100 LEDs). ESP32-S3: 4 TX channels. ESP32-C3: 2 TX.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [esp32, rmt, ws2812b, parallel, throughput, measurement]
    relates_to: [ws2812b-timing-architecture, esp32-hardware-selection-rationale]
    notes: >
      WS2812B physical floor: 24 bits × 1.25µs = 30µs per LED, plus a 50µs
      reset. For 100 LEDs: 100 × 30µs + 50µs = 3.05ms minimum. Measured 3.14ms
      includes Show() call overhead and wait_tx_done sync.

      Throughput ceiling at 100 LEDs/strip is therefore ~318 fps regardless of
      CPU speed. To go faster: fewer LEDs per strip, more channels, or a
      faster IC family (APA102/SK9822 SPI is not bound by 800kHz one-wire).

      Channel-count availability is a variant-selection axis for
      parallel-strip installations: classic ESP32 → 8, S3 → 4 TX + 4 RX,
      C3 → 2 TX.

  - id: esp32-rmt-isr-cpu-overhead
    date: 2026-04-17
    touched: 2026-04-17
    title: "ESP32 RMT block-refill ISRs steal CPU on the core that initialized the driver"
    summary: >
      RMT block memory is 64 32-bit slots per channel. WS2812B frames longer
      than ~32 LEDs require block-refill (half-empty) ISRs to stream the rest.
      The ISR is bound to whichever core called rmt_driver_install(). Measured
      on classic ESP32 driving 8 strips × 100 LEDs: ~37 refills per channel ×
      8 channels = ~296 ISR entries during the 3ms transmit window, costing
      ~1.2ms of CPU on the issuing core.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [esp32, rmt, isr, cpu, measurement]
    relates_to: [esp32-rmt-8-channel-parallel-ws2812b, esp32-dual-core-rmt-render-overlap]
    notes: >
      Each WS2812B bit consumes one RMT slot. 100 LEDs × 24 bits = 2400 slots
      needed vs 64 available, so the driver refills mid-transmission. Half-empty
      threshold gives ~2400/64 ≈ 37 ISR fires per channel per frame.

      Measured on classic ESP32 (ESP32-D0WD-V3), 8 strips × 100 LEDs each, ~3ms
      wire time: render-only 1.56ms vs render-while-transmitting 2.76ms on the
      same core → ~1.2ms ISR steal.

      Core affinity for these ISRs is fixed at rmt_driver_install() time, not
      Show() time — relevant when planning which core hosts the driver.

  - id: esp32-dual-core-rmt-render-overlap
    date: 2026-04-17
    touched: 2026-04-17
    title: "ESP32 dual-core allows render and RMT transmit on separate cores"
    summary: >
      Classic ESP32 has two Xtensa LX6 cores at 240MHz. With the RMT driver
      (and its refill ISRs) installed on one core and render running on the
      other, compute and LED transmission overlap rather than serialize.
      Measured on classic ESP32 driving 8 strips × 100 WS2812B: 169fps
      single-core → 204fps dual-core. Practical ceiling at this config is
      ~210fps because the 6-channel RMT concurrency cliff (see
      esp32-rmt-6-channel-concurrency-cliff) forces Show() to serialize the
      last two channels behind wire time. ESP32-C3 (single RISC-V core)
      cannot overlap; ESP32-S3 (dual LX7) can.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [esp32, dual-core, rmt, fps, measurement]
    relates_to: [esp32-rmt-isr-cpu-overhead, esp32-rmt-8-channel-parallel-ws2812b, esp32-rmt-6-channel-concurrency-cliff, esp32-c3-single-core-web-blocking]
    notes: >
      Hardware fact: the second core is genuinely free for application work.
      Arduino's loop() runs on core 1 by default; core 0 hosts WiFi/BT stacks
      when active but is otherwise available. RMT ISRs run on whichever core
      installed the driver (see esp32-rmt-isr-cpu-overhead), so placement is
      a setup-time decision.

      Measured frame times, classic ESP32 (ESP32-D0WD-V3), 8 strips × 100
      WS2812B each, no WiFi active:
        single-core: render(2.76ms with ISR steal) + show(3.14ms) ≈ 5.9ms → 169fps
        dual-core measured: 4.88ms → 204fps  (render 1.72ms, show 3.16ms)
        structural floor: render(1.72ms overlapped) + show(3.16ms) ≈ 4.88ms → 205fps

      The earlier 318fps wire-time ceiling was wrong for this config — it
      assumed all 8 channels kick truly in parallel, but classic ESP32 RMT has
      a 6-channel concurrency cliff: the 7th rmt_write_sample() call blocks
      for the full wire time of an already-running channel. So total Show()
      cost = wire_time + small overhead, even when render fully overlaps.
      Measured 204fps is within 0.5% of the structural floor for this path.

  - id: esp32-rmt-6-channel-concurrency-cliff
    date: 2026-04-17
    touched: 2026-04-17
    title: "Classic ESP32 RMT sustains only 6 channels in true parallel; 7th blocks"
    summary: >
      Classic ESP32 (ESP32-D0WD-V3) has 8 RMT channels and each has its own
      GPIO mux, but the peripheral's internal transmit arbiter sustains at
      most ~6 concurrent channels. Queueing a 7th rmt_write_sample() while
      six are already transmitting blocks the caller for ~full wire time of
      one channel before returning. This collapses the "8 parallel kicks"
      assumption for any fan-out beyond 6.
    status: resolved
    severity: high
    scope: hardware
    source: []
    tags: [esp32, rmt, ws2812b, parallel, throughput, measurement, cliff]
    relates_to: [esp32-rmt-8-channel-parallel-ws2812b, esp32-dual-core-rmt-render-overlap]
    notes: >
      Measured kick-to-completion of rmt_write_sample() back-to-back across
      N channels on classic ESP32, 100 LEDs × 24 bits per channel:

        N=1 →   22µs   (kick only)
        N=2 →   48µs
        N=4 →   91µs
        N=5 →  165µs
        N=6 →  311µs
        N=7 → 3060µs   ← cliff (wire-time of one full WS2812B frame)
        N=8 → 3121µs

      Up to 6, each successive call adds small queueing overhead and all run
      concurrently. The 7th call cannot queue — it waits for one of the busy
      channels to finish. After one finishes at T≈3050µs, channel 7 kicks
      and adds ~60µs for channel 8 (which finds a free slot).

      Implication for 8-channel fan-out: effective Show() cost ≥ wire_time,
      not parallel-kick_time. For N≤6 strips, the "true parallel" model
      holds and throughput is bounded by max(render, wire_time). Beyond 6,
      total show = wire_time + overhead regardless of channel count.

      Practical mitigation: split 8 pins across RMT (first 6) + I2S parallel
      (remaining 2), or use a 4-channel-per-half scheme. Or accept the
      wire-time floor and prioritize render quality within it. ESP32-S3 has
      only 4 TX channels so it cannot hit this cliff at 8 strips — it hits
      a harder wall earlier.

  - id: neopixelbus-i2s1x8-ws2812b-fill-serialization
    date: 2026-04-17
    touched: 2026-04-17
    title: "NeoPixelBus I2s1X8 method serializes buffer fills per bus instance"
    summary: >
      The NeoEsp32I2s1X8Ws2812xMethod driver in NeoPixelBus 2.8.4 uses a
      single I2S1 DMA stream to drive up to 8 GPIO bits in true parallel,
      but exposes the API as 8 independent NeoPixelBus<> instances. Each
      instance's Show() calls FillBuffers() to write its bit-column into
      the shared DMA buffer serially. For 8 strips × 100 LEDs this costs
      ~2.8ms of CPU fill time per frame, on top of wire time — making it
      slower than 8-channel RMT for this size on classic ESP32.
    status: resolved
    severity: medium
    scope: hardware
    source: []
    tags: [esp32, i2s, ws2812b, neopixelbus, measurement]
    relates_to: [esp32-rmt-8-channel-parallel-ws2812b, esp32-rmt-6-channel-concurrency-cliff]
    notes: >
      Measured on classic ESP32, 8 strips × 100 LEDs, swapping only the
      NeoPixelBus method type (RMT → I2s1X8):

        RMT 8-channel:  render 1.72ms + show 3.16ms →  204fps
        I2s1X8 8-inst:  render 1.72ms + show 4.42ms →  162fps
          per-strip fill µs: [1897, 353, 361, 357, 356, 362, 354, 355]

      Fill cost per instance ≈ 355µs × 8 = 2840µs, plus a ~1500µs wait on
      the first strip for prior DMA to complete. The I2S peripheral itself
      is transmitting at wire-time floor (3.05ms), but the library pattern
      requires traversing 2400 WS2812 symbols once per instance to write
      the bit-column for that pin, which is serial CPU work.

      Where I2S1X8 wins: fewer pins (2-4) sharing the single DMA stream —
      fill count drops proportionally. For 4 strips × 100 LEDs, expected
      fill ~1.4ms < RMT's 4-channel parallel overhead. Not measured here.

      Alternative: a single I2S driver that takes a packed [LEDs × strips]
      array and writes one bit-column loop (no per-instance API) would
      reclaim the 2.8ms fill cost. Not available in NeoPixelBus.

  - id: esp32-rmt-i2s-hybrid-does-not-dodge-cliff
    date: 2026-04-21
    touched: 2026-04-21
    title: "Hybrid 6 RMT + 2 I2S does not beat 8-channel RMT on classic ESP32"
    summary: >
      Tested the hypothesis that putting 6 strips on RMT (within the
      concurrency-safe band) plus 2 strips on the I2S1 mux would let both
      peripherals transmit concurrently and break the ~205fps ceiling on
      classic ESP32. Measured 161fps — worse than pure-RMT 204fps. The
      per-channel scaling shows the 7th call (first I2S strip) still costs
      ~3.4ms, matching the RMT-only cliff. The two peripherals do not run
      truly concurrent through the NeoPixelBus library; I2S FillBuffers()
      spins on i2sWriteDone() each call, serializing the I2S side against
      itself at wire-time granularity.
    status: resolved
    severity: medium
    scope: hardware
    source: festicorn/biolum/src/hybrid_bench.cpp
    tags: [esp32, rmt, i2s, ws2812b, neopixelbus, measurement, hybrid]
    relates_to: [esp32-rmt-6-channel-concurrency-cliff, neopixelbus-i2s1x8-ws2812b-fill-serialization, esp32-dual-core-rmt-render-overlap]
    notes: >
      Config: 6 strips on NeoEsp32Rmt{0..5}Ws2812xMethod, 2 strips on
      NeoEsp32I2s1X8Ws2812xMethod (sparse instantiation of 2 of 8 mux slots).
      All strips 100 WS2812B LEDs.

      Show() scaling, fresh boot, prior frame fully settled (delay 15ms):
        N=1 RMT:        19µs
        N=2 RMT:        37µs
        N=4 RMT:        92µs
        N=6 RMT:       311µs   (cliff-free within 6 channels)
        N=7 (+1 I2S): 3439µs   ← first I2S call blocks ~full wire time
        N=8 (+2 I2S): 3768µs

        Pipelined: 161fps, render 2285µs (simulated), show 3900µs.

      The I2S cost is paid even when StartWrite() does not actually kick
      (only 1 of 2 mux slots filled) — FillBuffers() itself spins on
      i2sWriteDone(), and that flag apparently doesn't clear for ~wire time
      after the previous kick regardless of elapsed wall-clock.

      Takeaway: you cannot compose RMT and I2S through NeoPixelBus to get
      parallel peripheral throughput. Breaking past 205fps on classic ESP32
      at 8×100 WS2812B requires one of: (a) a custom I2S driver that packs
      all pins into one fill pass and synchronizes only once per frame,
      (b) fewer LEDs/strip (wire-time scales), (c) SPI-clocked LED family
      (APA102/SK9822), or (d) different MCU.
