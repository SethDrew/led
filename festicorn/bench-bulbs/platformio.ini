; bench-bulbs — LAB / BENCH project. NOT production.
;
; A/B test rig that runs BOTH festicorn animation pipelines on a single
; ESP32-C3 super-mini receiver, driven by two simultaneous ESP-NOW senders
; broadcasting on the same Wi-Fi channel:
;
;   • original-duck v0.1 sender (mic + gyro)  → 15 B SensorPacket
;       → drives 50× SK6812 RGBW on GPIO 10
;       → animations: sparkle_burst, fire_meld, fire_flicker, quiet_bloom
;       → effect select is automatic from tilt/audio (verbatim duck logic)
;
;   • gyro-sense v1 sender (gyro only)        → 16 B TelemetryPacketV1
;       → drives 50× WS2812B RGB on GPIO 21
;       → animation: bloom (collapsed from 6 strips × 100 LEDs to 1 × 50)
;
; Receiver dispatches inbound packets by length in onReceive(). Same Wi-Fi
; channel for both sender↔receiver pairs (auto-discovered via SSID scan
; for `cuteplant` at boot, with the same 5-min rescan as the senders).
;
; Hardware:
;   ESP32-C3 super-mini receiver
;     MAC : 10:00:3B:B0:6E:04
;     port: /dev/cu.usbmodem114401
;   GPIO 10 → 50× SK6812 RGBW (driven via NeoPixelBus RMT channel 0)
;   GPIO 21 → 50× WS2812B RGB  (driven via NeoPixelBus RMT channel 1)
;
; The biolum/ project remains the production target for the bioluminescence
; sculpture. This bench project is allowed to drift — do not refactor in
; lockstep. When you want the canonical bloom firmware, look at biolum/.
;
; Build:    .venv/bin/pio run -e bench
; Flash:    .venv/bin/pio run -e bench -t upload
; Monitor:  .venv/bin/pio device monitor

[platformio]
default_envs = bench

[env:bench]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem114401
upload_speed = 460800
monitor_port = /dev/cu.usbmodem114401
monitor_speed = 460800
build_src_filter = -<*> +<bench.cpp>
lib_extra_dirs = ../lib
build_unflags = -Os
build_flags =
    -O2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    makuna/NeoPixelBus@^2.7
