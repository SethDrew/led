; bench-rmt-test — RMT contention test, port of bulb-fleet with different GPIOs and no stagger.
;
; Hardware: classic ESP32 (D0WD-V3). Six WS2812B RGB strips on RMT channels
; 0..5, pins 4 / 18 / 32 / 12 / 25 / 26, 100 LEDs per strip (600 total).
; bench-bulbs board (4 real pins + 2 phantom).
;
; Build:    .venv/bin/pio run -e rmt-test
; Flash:    .venv/bin/pio run -e rmt-test -t upload
; Monitor:  .venv/bin/pio device monitor

[platformio]
default_envs = rmt-test

[env:rmt-test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 460800
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 460800
build_src_filter = -<*> +<rmt_test.cpp>
lib_extra_dirs = ../lib
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=300
lib_deps =
    makuna/NeoPixelBus@^2.7
