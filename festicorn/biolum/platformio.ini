; Biolum — LED installation on classic ESP32 (4 strips × 200 LEDs, single 74AHCT125 level shifter)
; Pins: 23, 22, 25, 26
;
; Hardware: ESP32-D0WD-V3, MAC f4:2d:c9:6d:b2:58, /dev/cu.usbserial-141440

[platformio]
default_envs = bloom

[env:wiring_test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-141440
upload_speed = 460800
monitor_port = /dev/cu.usbserial-141440
monitor_speed = 115200
build_src_filter = -<*> +<wiring_test.cpp>
build_flags =
    -DLEDS_PER_STRIP=30
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

[env:bloom]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 460800
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
build_src_filter = -<*> +<bloom.cpp>
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=200
lib_extra_dirs = ../lib
lib_deps =
    makuna/NeoPixelBus@^2.7

; Minimal SK6812 RGBW diagnostic — first 3 LEDs red at 20%, rest off.
; Same library as bulb_receiver (Adafruit_NeoPixel) to rule out library/timing.
[env:rgbw_min_test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 460800
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
build_src_filter = -<*> +<rgbw_min_test.cpp>
build_flags =
    -DLED_PIN=25
    -DLED_COUNT=150
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

; SK6812 RGBW variant — single strip on GPIO 14, 150 LEDs, 2 colonies.
; Ports the latest RGB ideas (purple drift, per-colony state, per-channel gate)
; together with the W-channel handling from bulbs/bulb_receiver.cpp.
[env:bloom_rgbw]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 460800
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
build_src_filter = -<*> +<bloom_rgbw.cpp>
build_unflags = -Os
build_flags =
    -O2
    -DLED_PIN=25
    -DLEDS_TOTAL=150
lib_extra_dirs = ../lib
lib_deps =
    makuna/NeoPixelBus@^2.7
