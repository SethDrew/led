; Biolum — LED installation on classic ESP32 (6 strips × 100 LEDs)
; Pins: 4, 16, 17, 5, 18, 19  (RMT channels 0..5 — within 6-channel concurrency-safe band)
;
; Hardware: ESP32-D0WD-V3, MAC f4:2d:c9:6d:b2:58, /dev/cu.usbserial-11440

[platformio]
default_envs = bloom

[env:wiring_test]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-141440
upload_speed = 460800
monitor_port = /dev/cu.usbserial-141440
monitor_speed = 115200
build_src_filter = -<*> +<wiring_test.cpp>
build_flags =
    -DLEDS_PER_STRIP=30
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

[env:bloom]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-11440
upload_speed = 460800
monitor_port = /dev/cu.usbserial-11440
monitor_speed = 115200
build_src_filter = -<*> +<bloom.cpp>
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=100
lib_extra_dirs = ../lib
lib_deps =
    makuna/NeoPixelBus@^2.7

; OTA flavor — same firmware as [env:bloom], uploads over Wi-Fi via espota.
; Use after the first wired flash establishes the OTA listener. mDNS lookup of
; biolum.local needs the ESP32 to have advertised via ArduinoOTA.begin() at boot.
; If mDNS is flaky on your network, replace `biolum.local` with the IP printed
; on the serial console at boot.
[env:bloom_ota]
extends = env:bloom
upload_protocol = espota
upload_port = biolum.local

