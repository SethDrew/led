; bulb-fleet — sparkle effect on the 6-strip ESP32 fleet board.
;
; Hardware: classic ESP32 (D0WD-V3), MAC f4:2d:c9:6d:b2:58. Six WS2812B
; RGB strips on RMT channels 0..5, pins 4 / 16 / 17 / 5 / 18 / 19,
; 50 LEDs per strip (300 total). Same physical board as biolum/, but new
; firmware that listens to the duck's ESP-NOW SensorPacket broadcast
; (forwarded by espnow-bridge during laptop-driven sessions) and renders
; sparkle_burst, with per-strip hue offset for ensemble character.
;
; Build:    .venv/bin/pio run -e bulb-fleet
; Flash:    .venv/bin/pio run -e bulb-fleet -t upload

[env:bulb-fleet]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<bulb_fleet.cpp>
lib_extra_dirs = ../lib
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=100
lib_deps =
    makuna/NeoPixelBus@^2.7
