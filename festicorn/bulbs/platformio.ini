; Streaming receiver for A/B comparison (dual strip on receiver board)
; Receives 100 LEDs via serial: first 50 → GPIO 10, next 50 → GPIO 21
; Flash onto Board B (receiver, MAC 10:00:3B:B0:6E:04)
[env:stream_recv]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem112201
upload_speed = 460800
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 1000000
build_src_filter = -<*> +<stream_recv.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

