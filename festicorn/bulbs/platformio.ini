[platformio]
default_envs = async_bloom

; Bulbs — ESP-NOW split: sender (handheld sensors) + receiver (LED strip)
;
; HARDWARE NOTE — two ESP32-C3 Super Mini boards:
;   Board A  MAC 38:44:BE:45:D9:CC — broken WiFi RX (can transmit, cannot receive)
;            → must be used as SENDER only
;   Board B  MAC 10:00:3B:B0:6E:04 — working WiFi RX/TX
;            → used as RECEIVER

[env:gyro_mic_fade]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem11401
upload_speed = 460800
monitor_port = /dev/cu.usbmodem11401
monitor_speed = 460800
build_src_filter = -<*> +<gyro_mic_fade.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

[env:sender]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem11401
