[platformio]
default_envs = receiver

; Bulbs — ESP-NOW split: sender (handheld sensors) + receiver (LED strip)
;
; HARDWARE NOTE — three ESP32-C3 Super Mini boards:
;   Board A  MAC 38:44:BE:45:D9:CC — working WiFi TX/RX (confirmed via SoftAP + ESP-NOW 2x2)
;   Board B  MAC 10:00:3B:B0:6E:04 — broken WiFi TX (RX works; TX reports success but 0% delivery)
;            SoftAP beacons invisible to all scanners. Hardware-level TX failure.
;   C3-New   MAC 10:00:3B:B1:5D:10 — working WiFi TX/RX (confirmed via SoftAP + ESP-NOW 2x2)

[env:gyro_mic_fade]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem11401
upload_speed = 460800
monitor_port = /dev/cu.usbmodem11401
monitor_speed = 460800
build_src_filter = -<*> +<gyro_mic_fade.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

[env:sender]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem112201
upload_speed = 460800
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 460800
build_src_filter = -<*> +<sender.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:receiver]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem11401
upload_speed = 460800
monitor_port = /dev/cu.usbmodem11401
monitor_speed = 460800
build_src_filter = -<*> +<bulb_receiver.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLED_PIN_OVERRIDE=21
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

