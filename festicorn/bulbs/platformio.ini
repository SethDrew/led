; Bulbs — standalone ESP32-C3 effects (self-contained, no laptop bridge)

[env:gyro_mic_fade]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem11401
upload_speed = 460800
monitor_port = /dev/cu.usbmodem11401
monitor_speed = 460800
build_src_filter = -<*> +<gyro_mic_fade.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
