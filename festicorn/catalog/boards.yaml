schema_version: 2

# Festicorn benchtop board fleet — physical boards keyed by MAC address.
# Track by MAC, not serial port: macOS usbmodem suffixes reshuffle when boards move.
#
# Multi-role: each board's `role` selects firmware via `firmware_by_role` below.
# `festicorn/gyro-sense/tools/register.py` upserts bulb-senders into this file
# after flashing the v1 telemetry firmware. Other roles are registered manually.

firmware_by_role:
  bulb-sender:
    source: festicorn/gyro-sense/src/sender.cpp
    packet_format: v1-telemetry-16B
    ranges:
      accel_g: 4
      gyro_dps: 1000
  duck-sender:
    source: festicorn/original-duck/src/sender.cpp
    packet_format: v0.1-mic-gyro
    notes: |
      Outlier wiring (SDA=20, SCL=21). INMP441 mic + MPU-6050 IMU.
      Festival v0.1 deploy. Pairs with rgbw-receiver.
  rgbw-receiver:
    source: festicorn/original-duck/src/bulb_receiver.cpp
    packet_format: v0.1-receiver
    notes: |
      50× SK6812 RGBW on GPIO 10. Pairs with duck-sender.
  test-receiver:
    source: null
    packet_format: tx_test_recv
    notes: |
      Classic-ESP32 fixture used during bulb-sender RX validation.

