schema_version: 2

# Festicorn benchtop board fleet — physical boards keyed by MAC address.
# Track by MAC, not serial port: macOS usbmodem suffixes reshuffle when boards move.
#
# Multi-role: each board's `role` selects firmware via `firmware_by_role` below.
# `festicorn/gyro-sense/tools/register.py` upserts bulb-senders into this file
# after flashing the v1 telemetry firmware. Other roles are registered manually.
#
# Deployment modes:
#   static  — `source` pins one firmware. Board is dedicated; flashing always
#             builds the same code. Use the `notes` to describe behavior.
#   dynamic — `source: null`. Board is a hardware fixture (breadboard, dev
#             rig) hosting whatever experiment is current. Catalog describes
#             the wiring + hazards, NOT the firmware. Per-board notes may
#             record what's currently flashed for traceability, but it is
#             not authoritative — read the board to know.

firmware_by_role:
  bulb-sender:
    deployment: static
    source: festicorn/gyro-sense/src/sender.cpp
    packet_format: v1-telemetry-16B
    ranges:
      accel_g: 4
      gyro_dps: 1000
  duck-sender:
    deployment: static
    source: festicorn/original-duck/src/sender.cpp
    packet_format: v0.1-mic-gyro
    notes: |
      Outlier wiring (SDA=20, SCL=21). INMP441 mic + MPU-6050 IMU.
      Festival v0.1 deploy. Pairs with rgbw-receiver.
  rgbw-receiver:
    deployment: static
    source: festicorn/original-duck/src/bulb_receiver.cpp
    packet_format: v0.1-receiver
    notes: |
      50× SK6812 RGBW bullet nodes (12mm, 3000K W, IP68, 3-pin green wire,
      DC5V) on GPIO 10. Wire order: GRBW (NEO_GRBW). Pairs with duck-sender.
      NB: bullet-node order GRBW differs from the take-root flex strips,
      which are RGBW — same chip, different product, different byte order.
  test-receiver:
    deployment: static
    source: null
    packet_format: tx_test_recv
    notes: |
      Classic-ESP32 fixture used during bulb-sender RX validation.
  bench-tree:
    deployment: static
    source: festicorn/bench-tree/src/main.cpp
    packet_format: standalone
    notes: |
      Standalone sap-flow animation on a 3-strip 197-LED tree topology
      (pins 27/13/14 via build flags). No network. Sap-flow particle
      effect lives at festicorn/bench-tree/src/foregrounds/SapFlowForeground.h.
  bench-bulbs:
    deployment: static
    source: festicorn/bench-bulbs/src/bench.cpp
    packet_format: dual (v0.1 SensorPacket 15B + v1 TelemetryPacketV1 16B)
    notes: |
      Dual-pipeline A/B receiver. Strip A: 50× SK6812 RGBW (GRBW order,
      bullet nodes) on GPIO 4 — driven by duck-sender. Strip B: 50× WS2812
      RGB on GPIO 18 — driven by gyro-sense v1 sender. Migrated from C3
      (GPIO 10/21) to classic ESP32 to fix single-core WiFi/RMT stutter.
      Dithering disabled, render target 60 FPS.
  biolum:
    deployment: static
    source: festicorn/biolum/src/bloom.cpp
    packet_format: v1-telemetry-16B (receiver, 6 senders)
    notes: |
      6-strip quiet bloom installation. 6× WS2812B RGB strips, one gyro
      sender per strip. ESP-NOW receiver demuxes by sender MAC.
  tree-of-record:
    deployment: static
    source: festicorn/tree-of-record/src/main.cpp
    packet_format: json-espnow (BS-26) + v1 telemetry/audio + AudioStreamV1 (204B)
    notes: |
      Audio record/playback installation. ESP32-D0WD-V3, 6× WS2812B RGB strips
      on RMT 0..5. BS-26 switches drive record/playback; hundreds knob selects
      one of 5 slots. Records LED-effect frames + 8 kHz/8-bit audio waveform to
      SPIFFS; playback re-runs the recorded effect and plays audio out the
      GPIO25 internal-DAC jack (24 kHz / 3× upsample — see #5938 mclk_div bug).
      Duck (original-duck sender_v3) streams telemetry/audio while recording.
      Build env tree-of-record-v2 = current board (pin16/150 LEDs); v1 = legacy
      board (pin15/100 LEDs).
  bs26:
    deployment: static
    source: festicorn/kaylab-knobs/src/main.cpp
    packet_format: json-espnow (knobs/switches/meters)
    notes: |
      Kay Lab 508-25 retrofit. ESP32 reads vintage panel switches/knobs and
      drives two analog meters, broadcasting full panel state over ESP-NOW
      (broadcast, channel 1, on-change + 1 s heartbeat). ADS1115 (I2C
      SDA=23/SCL=22) reads the decade box; dual onboard DAC (GPIO 25 µA,
      GPIO 26 V) drives the moving-coil meters. No mic/audio.
  noodles:
    deployment: dynamic
    source: null
    hardware:
      chip: esp32-d0wd-v3 (DevKit V1, 30-pin clone, CH340)
      strips: 2× WS2812 RGB (150 LEDs each, logically one 300-LED chain)
      pins: GPIO 4 (strip A, idx 0–149) / GPIO 19 (strip B, idx 150–299)
    notes: |
      Audio-reactive installation. Two 150-LED strips.
      Dynamic deployment — firmware changes with the experiment.
  take-root:
    deployment: dynamic
    source: null
    packet_format: standalone
    hardware:
      chip: esp32-d0wd-v3 (HW-394 / DevKit V1, 30-pin clone, CH340)
      strips: 3× SK6812 RGBW flex strip — wire order RGBW (NEO_RGBW)
      pins: GPIO 13 / 12 / 25 (strip 1 / 2 / 3 data)
      level_shifter: 74HCT245 (HCT only — never HC)
      power: 5 V buck rail shared with strips
      hazards: |
        GPIO 12 is the MTDI flash-voltage strapping pin. Must read LOW at
        boot. Safe pattern: 74HCT245 input is high-Z so ESP32 internal
        pull-down wins; NeoPixel begin() configures OUTPUT after strapping
        latches. Never INPUT_PULLUP on GPIO 12; never drive HIGH pre-boot.
    notes: |
      Bring-up + experimentation breadboard. Not pinned to one firmware —
      reflash freely. Per-board `last_flashed` may record current state.

