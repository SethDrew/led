; espnow-bridge — laptop ↔ ESP-NOW bridge for duck record/playback.
;
; RX: receives broadcast ESP-NOW frames (15-byte SensorPacket from duck
; sender), forwards each frame to the laptop over USB serial as a
; length-framed binary record.
; TX: reads framed records from the laptop, re-broadcasts them as ESP-NOW
; so the bulb receiver sees identical bytes during playback.
;
; Hardware: ESP32-C3 Super Mini (any spare).
; Channel discovery: same cuteplant SSID scan as the duck sender, so all
; three nodes (duck, bridge, receiver) lock to the same channel without
; configuration.

[env:bridge]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<bridge.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
