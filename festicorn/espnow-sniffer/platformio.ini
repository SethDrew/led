; espnow-sniffer — prints MAC + packet info for every ESP-NOW packet received.
; Flash to any spare ESP32-C3 super-mini to verify all gyro senders are visible.

[env:sniffer]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem2101
upload_speed = 460800
monitor_port = /dev/cu.usbmodem2101
monitor_speed = 115200
lib_extra_dirs = ../lib
build_src_filter = -<*> +<sniffer.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    bblanchon/ArduinoJson@^6.21
