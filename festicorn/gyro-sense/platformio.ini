[platformio]
default_envs = sender

; gyro-sense — v1 IMU telemetry sender + fleet registry + datasets.
;
; This directory holds the v1 16-byte gyro-only telemetry sender that pairs
; with the production biolum receiver (festicorn/biolum/). Plus all the
; recording firmware, capture tools, ESP-NOW streaming pipeline, and LittleFS
; datasets that drove the v1 wire-schema design.
;
; The v0.1 deployable installation (mic+gyro sender + RGBW receiver,
; outlier SDA=20/SCL=21 wiring) lives in festicorn/original-duck/ and is
; NOT covered by this platformio.ini.
;
; Canonical bulb-sender wiring (single source of truth in source defaults):
;   SDA=8, SCL=7, AD0=20 (driven LOW to force MPU-6050 @ 0x68).
; Gyro-only by default (no mic on canonical bulb boards).
;
; Fleet inventory across all festicorn projects lives in
; festicorn/catalog/boards.yaml (single source of truth, keyed by MAC).

; ── v1 production sender ────────────────────────────────────────
; 16-byte TelemetryPacketV1 broadcast at 25 Hz. Pairs with biolum/.
[env:sender]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem112201
upload_speed = 460800
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 460800
build_src_filter = -<*> +<sender.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DACCEL_RANGE_G=4
    -DGYRO_RANGE_DPS=1000

; ── LittleFS dataset recorder ───────────────────────────────────
; Captures raw IMU (and optional audio RMS) to /recN.bin on the sender,
; harvest later via `python harvest.py`. See data/PROTOCOL.md.
; Override --upload-port at the CLI when targeting a specific physical board.
[env:recorder]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<sender_recorder.cpp>
lib_extra_dirs = ../lib
board_build.filesystem = littlefs
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -DDISABLE_AUDIO

; Extended-range recorder variant — same hardware as `recorder` but configures
; the MPU-6050 at ±4g / ±1000°/s to recover headroom on severe taps and
; high-rotation strikes that pin the rails at the default ±2g/±250°/s.
; File header ver=2 carries the range so harvest.py can scale counts → physical.
;
; NOTE: previous variants `recorder_duck_ext` / `recorder_hanging_ext` extended
; non-existent base envs (`recorder_duck`, `recorder_hanging`) and would not
; build. Replaced with a single working ext env.
[env:recorder_ext]
extends = env:recorder
build_flags =
    ${env:recorder.build_flags}
    -DACCEL_RANGE_G=4
    -DGYRO_RANGE_DPS=1000

; ── ESP-NOW streaming pipeline (capture-firmware test fixtures) ──
; These two are NOT production firmware. They are dataset-capture test
; fixtures that produced the streaming recordings under data/recordings/.
; Sources live at data/recordings/_capture_firmware/.
;   stream_sender_test: ESP32-C3 with MPU-6050/clone, broadcasts batched samples.
;   stream_bridge_test: classic ESP32 receives + forwards binary frames over USB serial.
[env:stream_sender]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<../data/recordings/_capture_firmware/stream_sender_test.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -DDISABLE_AUDIO

; Extended-range stream variant. Range is encoded in StreamHeader.cfg byte
; (low nibble AFS_SEL, high nibble FS_SEL); legacy 0 = ±2g/±250°/s.
[env:stream_sender_ext]
extends = env:stream_sender
build_flags =
    ${env:stream_sender.build_flags}
    -DACCEL_RANGE_G=4
    -DGYRO_RANGE_DPS=1000

[env:stream_bridge]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-11440
upload_speed = 460800
monitor_port = /dev/cu.usbserial-11440
monitor_speed = 1000000
build_src_filter = -<*> +<../data/recordings/_capture_firmware/stream_bridge_test.cpp>

; ── Raw audio capture (INMP441 validation) ──────────────────────
; Streams 16 kHz int16 PCM over USB CDC serial. Used by
; audio-reactive/tools/dual_capture.py for ledger validation.
[env:raw_audio_sender]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem114301
upload_speed = 460800
monitor_port = /dev/cu.usbmodem114301
monitor_speed = 460800
build_src_filter = -<*> +<raw_audio_sender.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
lib_extra_dirs = ../lib

; ── Bench utilities ──────────────────────────────────────────────
; I2C probe — quick MPU-6050 / generic device detection on a freshly-connected
; ESP32-C3. Override upload_port at the CLI: `pio run -e i2c_probe -t upload \
;   --upload-port /dev/cu.usbmodemXXXXX`
[env:i2c_probe]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<i2c_probe.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

