[platformio]
default_envs = kaylab-knobs

; Kay Lab 508-25 retrofit knob/switch controller.
; Reads vintage panel knobs/switches, drives two analog meters via the
; onboard DACs, and broadcasts panel state over ESP-NOW (channel 1).
; Shared knob controller for festicorn installations (tree-of-record, etc.).
[env:kaylab-knobs]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-7
upload_speed = 921600
monitor_port = /dev/cu.usbserial-7
monitor_speed = 115200
lib_deps = adafruit/Adafruit ADS1X15@^2.5.0
