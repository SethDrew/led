; noodles — 2× 150 LED strip audio-reactive installation.
;
; Hardware:
;   ESP32 classic (DevKit V1, 30-pin clone, CH340)
;   MAC: f4:2d:c9:6d:b2:58
;   GPIO 5  → strip A data (150 LEDs)
;   GPIO 15 → strip B data (150 LEDs)

[env:noodles]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-11430
upload_speed = 460800
monitor_speed = 115200
build_src_filter = -<*> +<main.cpp>
build_flags =
    -DSTRIP_A_PIN=4
    -DSTRIP_B_PIN=19
    -DNUM_LEDS=120
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
lib_extra_dirs =
    ../lib
