[platformio]
default_envs = receiver

; original-duck — v0.1 deployable installation (frozen).
;
; Hardware:
;   - Sender: ESP32-C3 Super Mini, MPU-6050 (I2C) + INMP441 (I2S mic).
;     Outlier "duck" pinout: SDA=20, SCL=21 (NOT the canonical 8/7 used by
;     the v1 telemetry sender in sender_rnd/). This sender ships in the
;     stuffed-animal totem and broadcasts a 15-byte SensorPacket via ESP-NOW.
;   - Receiver: ESP32-C3 Super Mini, SK6812 RGBW on GPIO 10 (50 LEDs).
;     Renders sparkle_burst / fire_meld / fire_flicker / quiet_bloom from
;     raw IMU + audio RMS. esp32_receiver builds the same firmware for
;     classic ESP32 with LED on GPIO 12.
;
; Shared C++ libraries (oklch_lut, delta_sigma, fast_math) are referenced
; from ../lib so original-duck stays current with shared utility fixes.
;
; HARDWARE NOTE — boards by MAC (ports change as they move on the bench):
;   Duck sender (MPU-6050 + INMP441)        ESP32-C3   38:44:BE:45:D9:CC
;   RGBW bulb receiver (50× SK6812, GPIO 10) ESP32-C3   10:00:3B:B0:6E:04
;   Classic ESP32 receiver variant           ESP32      f4:2d:c9:6d:b2:58 (unconfirmed)
; Port assignments below are approximate — boards re-enumerate. Override at
; the CLI if needed: `pio run -e <env> -t upload \
;   --upload-port /dev/cu.usbmodemXXXXX`. Identify by MAC, not port.

[env:sender]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem112201
upload_speed = 460800
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 460800
build_src_filter = -<*> +<sender.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; Standalone WOM debug — configures MPU motion-detect with the proposed
; FIXED register sequence (HPF=0x01, MOT_DETECT_CTRL=0x15) and polls
; INT_STATUS in the main loop without entering sleep. Used to verify that
; MPU-side motion detection actually trips on shake.
[env:wom_debug]
extends = env:sender
build_src_filter = -<*> +<wom_debug.cpp>


[env:receiver]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem114401
upload_speed = 460800
monitor_port = /dev/cu.usbmodem114401
monitor_speed = 460800
build_src_filter = -<*> +<bulb_receiver.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLED_PIN_OVERRIDE=10
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

[env:esp32_receiver]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 460800
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 460800
build_src_filter = -<*> +<bulb_receiver.cpp>
lib_extra_dirs = ../lib
build_flags =
    ; GPIO 13 — GPIO 12 is MTDI strap pin (flash voltage select); pulling
    ; it high at reset crashes ROM bootloader. Use any non-strap pin.
    -DLED_PIN_OVERRIDE=13
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

