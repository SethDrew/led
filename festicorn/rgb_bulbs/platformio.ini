[platformio]
default_envs = receiver

[env:receiver]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<bulb_receiver.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
