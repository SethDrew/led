; rgbw-bulbs-standalone — autonomous SK6812 RGBW bloom on classic ESP32.
; No ESP-NOW receiver; WiFi station mode + ArduinoOTA for wireless flashing.
;
; Hardware: ESP32-D0WD-V3, 100 SK6812 RGBW LEDs on GPIO 25, 2 colonies.

[platformio]
default_envs = bloom_standalone

[env:bloom_standalone]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 460800
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = -<*> +<bloom_standalone.cpp>
build_unflags = -Os
build_flags =
    -O2
    -DLED_PIN=25
    -DLEDS_TOTAL=100
    -DCORE_DEBUG_LEVEL=4
lib_extra_dirs = ../lib
lib_deps =
    makuna/NeoPixelBus@^2.7
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer

; OTA target — set upload_port to the device IP printed on serial at boot,
; or use mDNS hostname (rgbw-bulbs.local). Flash once over USB first.
[env:bloom_standalone_ota]
extends = env:bloom_standalone
upload_protocol = espota
upload_port = rgbw-bulbs.local
