; road-bulbs — portable 50-bulb rig driven by phone sensors over USB serial.
;
; Fork of original-duck/bulb_receiver with ESP-NOW replaced by serial frame
; input. Phone (Phyphox) → laptop (phone_bridge.py) → USB serial → this board.
;
; Hardware: classic ESP32 (take-root board, MAC b0:cb:d8:8a:85:f4).
;   GPIO 13 → 50× SK6812 RGBW bulbs (through 74HCT245 level shifter)
;
; Frame format (same as mic_bridge): [0xA5][0x5A][LEN][PAYLOAD][XOR8]
; SensorPacket payload (15 bytes): int16 ax,ay,az,gx,gy,gz; uint16 rawRms; uint8 micEnabled
;
; Build:    .venv/bin/pio run -e road-bulbs
; Flash:    .venv/bin/pio run -e road-bulbs -t upload
; Monitor:  .venv/bin/pio device monitor -p /dev/cu.usbserial-8 -b 460800

[env:road-bulbs]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 921600
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 460800
build_src_filter = -<*> +<receiver.cpp>
lib_extra_dirs = ../lib
build_flags =
    -DLED_PIN_OVERRIDE=13
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
