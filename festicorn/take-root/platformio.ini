; take-root — ESP32 hardware bring-up test for a fresh breadboard.
;
; 3× SK6812 RGBW strips driven through a 74HCT245 level shifter (3.3 V → 5 V).
; First 60 LEDs of each strip held at 50% green. All 3 strips in sync.
;
; Hardware:
;   ESP32 classic (HW-394 / DevKit V1, 30-pin clone)
;   GPIO 13 → 74HCT245 → strip 1 data
;   GPIO 12 → 74HCT245 → strip 2 data   (strapping pin — see main.cpp note)
;   GPIO 25 → 74HCT245 → strip 3 data
;   5 V rail from 12 V → buck, shared with strips.

[env:take-root]
platform = espressif32
board = esp32dev
framework = arduino
; upload_port maps to the take-root board (CH340, MAC b0:cb:d8:8a:85:f4).
; If the port re-enumerates, override at the CLI:
;   pio run -e take-root -t upload --upload-port /dev/cu.usbserial-XXXX
; Do NOT use /dev/cu.usbserial-0001 — that's bench-tree (MAC a4:f0:0f:61:40:18).
upload_port = /dev/cu.usbserial-8
upload_speed = 921600
monitor_speed = 115200
build_src_filter = -<*> +<main.cpp>
build_flags =
    -DSTRIP1_PIN=13
    -DSTRIP2_PIN=12
    -DSTRIP3_PIN=25
    -DNUM_LEDS=300
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

; =============================================================================
