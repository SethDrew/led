; topo-tester — standalone test tool for bulb-fleet 2D topology.
;
; Same hardware as bulb-fleet: classic ESP32, 6× WS2812B strips, 100 LEDs each.
; Pins 4/16/17/5/18/19 on RMT0..5. Joins "cuteplant" hotspot, listens on UDP
; 4211 for mode-switch commands ('1'..'6') and also accepts those over serial.
;
; Build:    ../../.venv/bin/pio run -e topo-tester
; Flash:    ../../.venv/bin/pio run -e topo-tester -t upload

[env:topo-tester]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 460800
monitor_speed = 460800
build_src_filter = -<*> +<topo_tester.cpp>
lib_extra_dirs = ../lib
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=100
lib_deps =
    makuna/NeoPixelBus@^2.7
