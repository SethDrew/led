; Tree-of-record — biolum board, 6 strips × 100 LEDs (WS2812B RGB)
; Pins: 4, 16, 17, 5, 18, 19  (RMT channels 0..5)
;
; Hardware: ESP32-D0WD-V3. Receives BS-26 state packets over ESP-NOW
; (JSON broadcast, channel 1). Renders ambient bloom on all 6 strips,
; driven by the BS-26 decade knob (brightness) and uA meter (speed).

[env:tree-of-record]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-1130
upload_speed = 460800
monitor_port = /dev/cu.usbserial-1130
monitor_speed = 115200
build_src_filter = -<*> +<main.cpp>
board_build.partitions = partitions.csv
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=100
lib_extra_dirs = ../lib
lib_deps =
    makuna/NeoPixelBus@^2.7
    bblanchon/ArduinoJson@^6.21
