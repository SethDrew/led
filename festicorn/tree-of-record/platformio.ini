; Tree-of-record — audio record/playback installation. ESP32-D0WD-V3,
; 6× WS2812B RGB strips on RMT 0..5. Receives BS-26 state packets + duck
; telemetry/audio over ESP-NOW (channel 1); records LED+audio to 5 slots
; and plays them back, with audio out the GPIO25 DAC jack.
;
; TWO physical boards run this firmware:
;   env:tree-of-record-v1  — original board. Pins 4/15/17/5/18/19, 100 LEDs.
;                            MAC ?  (legacy; slated to become a sparkle rig).
;   env:tree-of-record-v2  — current deployment board. Pins 4/16/17/5/18/19,
;                            150 LEDs. MAC F4:2D:C9:6D:B2:58 (was "biolum-a").
; Only the strip1 pin (15→16) and LED count (100→150) differ; the firmware
; is identical. Boards re-enumerate (CH340) — override the port at the CLI.

[env:tree-of-record-v1]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-1130
upload_speed = 460800
monitor_port = /dev/cu.usbserial-1130
monitor_speed = 115200
build_src_filter = -<*> +<main.cpp>
board_build.partitions = partitions.csv
build_unflags = -Os
build_flags =
    -O2
    -DLEDS_PER_STRIP=100
lib_extra_dirs = ../lib
lib_deps =
    makuna/NeoPixelBus@^2.7
    bblanchon/ArduinoJson@^6.21

; tree-of-record-v2 — current deployment board (MAC F4:2D:C9:6D:B2:58,
; formerly "biolum-a"). strip1 on GPIO 16, 150 LEDs/strip. Everything else
; — audio record/playback, BS-26, DAC on GPIO25 — identical to v1.
[env:tree-of-record-v2]
extends = env:tree-of-record-v1
upload_port = /dev/cu.usbserial-11440
monitor_port = /dev/cu.usbserial-11440
build_flags =
    -O2
    -DLEDS_PER_STRIP=150
    -DSTRIP1_PIN=16

; dac_test — GPIO25 / 3.5mm jack bring-up. Plays a repeating A-major
; arpeggio through the internal DAC using the same I2S config as real
; playback. No LEDs, no network — isolates the analog wiring. Flash this
; to verify the jack, then reflash tree-of-record-v2 to restore.
[env:dac_test]
extends = env:tree-of-record-v1
upload_port = /dev/cu.usbserial-11440
monitor_port = /dev/cu.usbserial-11440
build_src_filter = -<*> +<dac_test.cpp>
build_flags =
    -O2

; wav_play — loop the embedded raw no-boost capture (wav_samples.h) through
; the GPIO25 DAC. Real audio through the real DAC path. Reflash
; tree-of-record-v2 after.
[env:wav_play]
extends = env:tree-of-record-v1
upload_port = /dev/cu.usbserial-11440
monitor_port = /dev/cu.usbserial-11440
build_src_filter = -<*> +<wav_play.cpp>
build_flags =
    -O2
