; Aggregate: Tree animation + streaming receiver
; ESP32 drives tree (3 strips) + receives serial for 300-LED strip on D33

[platformio]
default_envs = esp32_aggregate

[env:esp32_aggregate]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 921600
monitor_speed = 1000000
build_flags =
    -DSTRIP1_PIN=27
    -DSTRIP2_PIN=13
    -DSTRIP3_PIN=14
    -DSTREAM_PIN=33
    -DSTREAM_LEDS=300
    -I../tree/src
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
