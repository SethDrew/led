board = esp32-c3-devkitm-1
framework = arduino
upload_port = /dev/cu.usbmodem12201
upload_speed = 460800
monitor_port = /dev/cu.usbmodem12201
monitor_speed = 115200
build_src_filter = -<*> +<soft_white_glow.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    fastled/FastLED@^3.7.0

