; Diffuser Stick — ESP32 streaming receiver
; Two strips on separate data pins, receives frames via serial.

[env:stick_stream]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 921600
monitor_speed = 1000000
build_flags =
    -DSTRIP_A_PIN=32
    -DSTRIP_A_COUNT=12
    -DSTRIP_B_PIN=12
    -DSTRIP_B_COUNT=11
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
