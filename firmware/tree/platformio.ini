; LED Tree + Strip — ESP32
;
; Tree: sap flow on 3 strips (pins 27/13/14, 197 LEDs)
; Strip: OKLCH rainbow on pin 32 (150 LEDs)
; WiFi + OTA enabled

[platformio]
default_envs = esp32_tree_rainbow

[env:esp32_tree_rainbow]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
upload_speed = 921600
monitor_speed = 115200
build_src_filter = -<*> +<tree_rainbow_test.cpp>
build_flags = -DSTRIP1_PIN=27 -DSTRIP2_PIN=13 -DSTRIP3_PIN=14 -DTEST_STRIP_PIN=32 -DTEST_STRIP_LEDS=150
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
